# Reusable Terraform Cost Analysis Workflow using Azure Native Tools + GitHub Copilot
# Uses: Azure CLI, Azure Cost Management, Azure Resource Graph, Azure Advisor
# NO Infracost required!
#
# Usage in other repos:
#   jobs:
#     cost-analysis:
#       uses: YOUR_ORG/.github/.github/workflows/terraform-cost-analysis-reusable.yml@main
#       with:
#         terraform_directory: infra
#       secrets:
#         AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
#         AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
#         AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

name: Terraform Cost Analysis (Azure Native + Copilot)

on:
  workflow_call:
    inputs:
      terraform_directory:
        description: 'Path to Terraform directory'
        required: false
        type: string
        default: 'infra'
      required_tags:
        description: 'Comma-separated list of required tags'
        required: false
        type: string
        default: 'Environment,Project,Owner,CostCenter,ManagedBy'
      azure_region:
        description: 'Azure region for cost estimation reference'
        required: false
        type: string
        default: 'northeurope'
      fail_on_missing_tags:
        description: 'Fail the workflow if required tags are missing'
        required: false
        type: boolean
        default: false
      cost_threshold:
        description: 'Monthly cost threshold in GBP (0 = disabled)'
        required: false
        type: number
        default: 0
      ai_model:
        description: 'GitHub Models AI model to use'
        required: false
        type: string
        default: 'gpt-4o'
      run_azure_advisor:
        description: 'Fetch Azure Advisor cost recommendations'
        required: false
        type: boolean
        default: true
      check_orphaned_resources:
        description: 'Check for orphaned/unused resources'
        required: false
        type: boolean
        default: true
    secrets:
      AZURE_CLIENT_ID:
        description: 'Azure Service Principal Client ID'
        required: true
      AZURE_TENANT_ID:
        description: 'Azure Tenant ID'
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: 'Azure Subscription ID'
        required: true
      AZURE_CLIENT_SECRET:
        description: 'Azure Service Principal Client Secret'
        required: true
      MODEL_ACCES:
        description: 'PAT with models:read scope for GitHub Models API (optional)'
        required: false

permissions:
  contents: read
  pull-requests: write
  id-token: write
  models: read

jobs:
  analyze:
    name: Azure Cost Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref || github.event.repository.default_branch || 'main' }}
          path: base

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # Azure Login using Service Principal
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Install Azure CLI Extensions
        run: |
          az extension add --name costmanagement --yes || true
          az extension add --name resource-graph --yes || true
          az extension add --name advisor --yes || true

      - name: Check for Terraform files
        id: check_files
        run: |
          if find "${{ inputs.terraform_directory }}" -name "*.tf" -type f 2>/dev/null | grep -q .; then
            echo "has_tf_files=true" >> $GITHUB_OUTPUT
          else
            echo "has_tf_files=false" >> $GITHUB_OUTPUT
            echo "::warning::No Terraform files found in ${{ inputs.terraform_directory }}"
          fi

      - name: Get Changed Files
        if: steps.check_files.outputs.has_tf_files == 'true'
        id: changed_files
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref || github.event.repository.default_branch || 'main' }}"
          CHANGED_FILES=$(git diff --name-only origin/${BASE_REF} -- '*.tf' '*.tfvars' | tr '\n' ' ')
          echo "files=$CHANGED_FILES" >> $GITHUB_OUTPUT
          git diff origin/${BASE_REF} -- '*.tf' '*.tfvars' > /tmp/terraform-diff.txt

      - name: Collect Terraform Content
        if: steps.check_files.outputs.has_tf_files == 'true'
        run: |
          echo "=== PR BRANCH TERRAFORM FILES ===" > /tmp/pr-terraform.txt
          find "${{ inputs.terraform_directory }}" -name "*.tf" -exec echo "--- {} ---" \; -exec cat {} \; >> /tmp/pr-terraform.txt 2>/dev/null || true
          
          echo "=== BASE BRANCH TERRAFORM FILES ===" > /tmp/base-terraform.txt
          find "base/${{ inputs.terraform_directory }}" -name "*.tf" -exec echo "--- {} ---" \; -exec cat {} \; >> /tmp/base-terraform.txt 2>/dev/null || true

      - name: Run Terraform Plan (PR Branch)
        if: steps.check_files.outputs.has_tf_files == 'true'
        id: tf_plan
        run: |
          cd "${{ inputs.terraform_directory }}"
          terraform init -backend=false
          terraform plan -no-color -out=tfplan 2>&1 | tee /tmp/terraform-plan.txt || true
          terraform show -no-color tfplan > /tmp/terraform-plan-details.txt 2>&1 || true
        continue-on-error: true

      # Get Azure Pricing for resources in Terraform
      - name: Get Azure Pricing Info
        if: steps.check_files.outputs.has_tf_files == 'true'
        id: azure_pricing
        env:
          ANALYSIS_AZURE_REGION: ${{ inputs.azure_region }}
          ANALYSIS_TERRAFORM_DIRECTORY: ${{ inputs.terraform_directory }}
        run: |
          echo "## Azure Resource Pricing Reference" > /tmp/azure-pricing.md
          echo "### 💰 Cost Impact Analysis" > /tmp/cost-impact.md
          echo "| Change | Resource | Est. Monthly Cost | Azure SKU/Tier | Notes |" >> /tmp/cost-impact.md
          echo "|--------|----------|-------------------|----------------|-------|" >> /tmp/cost-impact.md
          echo "" >> /tmp/azure-pricing.md
          echo "Region: $ANALYSIS_AZURE_REGION" >> /tmp/azure-pricing.md
          echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> /tmp/azure-pricing.md
          echo "" >> /tmp/azure-pricing.md

          RETAIL_API="https://prices.azure.com/api/retail/prices?api-version=2023-01-01-preview"
          TF_DIR="$ANALYSIS_TERRAFORM_DIRECTORY"
          BASE_TF_DIR="base/$ANALYSIS_TERRAFORM_DIRECTORY"
          HOURS_PER_MONTH=730
          DAYS_PER_MONTH=30
          TOTAL_FIXED=0
          HAS_VARIABLE=0
          HAS_GAPS=0
          STORAGE_ASSUMED_GB_MONTH=756
          APP_INSIGHTS_ASSUMED_GB_MONTH=30
          LOG_ANALYTICS_ASSUMED_GB_MONTH=30
          CONTAINER_REGISTRY_ASSUMED_GB_MONTH=50
          SERVICE_BUS_BASIC_ASSUMED_OPERATIONS_MILLIONS=5
          APIM_CONSUMPTION_ASSUMED_10K_CALLS=100
          GENERIC_STORAGE_ASSUMED_GB_MONTH=50
          GENERIC_10K_UNITS_ASSUMED_PER_MONTH=100
          COSMOS_ASSUMED_RU_PER_SEC=400

          tf_attr_in_dir() {
            local dir_path="$1"
            local resource_type="$2"
            local resource_name="$3"
            local attr_name="$4"
            awk -v resource_type="$resource_type" -v resource_name="$resource_name" -v attr_name="$attr_name" '
              $0 ~ "^resource \"" resource_type "\" \"" resource_name "\"" { in_block = 1; depth = 0 }
              in_block {
                open_count = gsub(/\{/, "&")
                close_count = gsub(/\}/, "&")
                depth += open_count - close_count
                if ($0 ~ "^[[:space:]]*" attr_name "[[:space:]]*=") {
                  value = $0
                  sub(/^[^=]*=[[:space:]]*/, "", value)
                  gsub(/^"|"$/, "", value)
                  print value
                  exit
                }
                if (depth <= 0) {
                  in_block = 0
                }
              }
            ' "$dir_path"/*.tf 2>/dev/null | head -1
          }

          tf_attr_for_address() {
            local resource_type="$1"
            local resource_name="$2"
            local attr_name="$3"
            tf_attr_in_dir "$TF_DIR" "$resource_type" "$resource_name" "$attr_name"
          }

          resource_inventory() {
            awk '
              /^resource "/ {
                line = $0
                sub(/^resource "/, "", line)
                split(line, parts, /" "/)
                resource_type = parts[1]
                resource_name = parts[2]
                sub(/".*/, "", resource_name)
                print resource_type "|" resource_name
              }
            ' "$TF_DIR"/*.tf 2>/dev/null | sort -u
          }

          resource_exists_in_dir() {
            local dir_path="$1"
            local resource_type="$2"
            local resource_name="$3"
            grep -h -q "^resource \"${resource_type}\" \"${resource_name}\"" "$dir_path"/*.tf 2>/dev/null
          }

          resource_block_checksum_in_dir() {
            local dir_path="$1"
            local resource_type="$2"
            local resource_name="$3"
            local block
            block=$(awk -v resource_type="$resource_type" -v resource_name="$resource_name" '
              $0 ~ "^resource \"" resource_type "\" \"" resource_name "\"" { in_block = 1; depth = 0 }
              in_block {
                print
                open_count = gsub(/\{/, "&")
                close_count = gsub(/\}/, "&")
                depth += open_count - close_count
                if (depth <= 0) {
                  exit
                }
              }
            ' "$dir_path"/*.tf 2>/dev/null)

            if [[ -n "$block" ]]; then
              printf '%s' "$block" | shasum -a 256 | awk '{print $1}'
            fi
          }

          plan_action() {
            local address="$1"
            local resource_type="${address%%.*}"
            local resource_name="${address#*.}"
            local pr_exists=1
            local base_exists=1
            local pr_checksum
            local base_checksum

            if grep -q "^# ${address} will be created" /tmp/terraform-plan.txt 2>/dev/null; then
              echo "Added"
            elif grep -q "^# ${address} will be updated in-place" /tmp/terraform-plan.txt 2>/dev/null; then
              echo "Modified"
            elif grep -q "^# ${address} must be replaced" /tmp/terraform-plan.txt 2>/dev/null; then
              echo "Modified"
            elif grep -q "^# ${address} will be destroyed" /tmp/terraform-plan.txt 2>/dev/null; then
              echo "Removed"
            else
              resource_exists_in_dir "$TF_DIR" "$resource_type" "$resource_name" || pr_exists=0
              resource_exists_in_dir "$BASE_TF_DIR" "$resource_type" "$resource_name" || base_exists=0

              if [[ "$pr_exists" -eq 1 && "$base_exists" -eq 0 ]]; then
                echo "Added"
                return
              fi

              if [[ "$pr_exists" -eq 1 && "$base_exists" -eq 1 ]]; then
                pr_checksum=$(resource_block_checksum_in_dir "$TF_DIR" "$resource_type" "$resource_name")
                base_checksum=$(resource_block_checksum_in_dir "$BASE_TF_DIR" "$resource_type" "$resource_name")
                if [[ -n "$pr_checksum" && -n "$base_checksum" && "$pr_checksum" != "$base_checksum" ]]; then
                  echo "Modified"
                  return
                fi
              fi

              echo ""
            fi
          }

          format_delta_estimate() {
            local new_amount="$1"
            local old_amount="$2"
            awk -v new_amount="$new_amount" -v old_amount="$old_amount" 'BEGIN {
              diff = new_amount - old_amount
              if (diff < 0) {
                printf "-£%.2f", -diff
              } else {
                printf "£%.2f", diff
              }
            }'
          }

          add_estimate_with_optional_delta() {
            local action="$1"
            local address="$2"
            local new_amount="$3"
            local old_amount="$4"
            local tier="$5"
            local notes="$6"
            local estimate="£${new_amount}"

            if [[ "$action" == "Modified" && -n "$old_amount" ]]; then
              estimate=$(format_delta_estimate "$new_amount" "$old_amount")
            fi

            append_cost_row "$action" "$address" "$estimate" "$tier" "$notes"
          }

          append_price_row() {
            local resource_label="$1"
            local source_label="$2"
            local price="$3"
            local unit="$4"
            local monthly_estimate="$5"
            local notes="$6"
            echo "| $resource_label | $source_label | $price | $unit | $monthly_estimate | $notes |" >> /tmp/azure-pricing.md
          }

          append_cost_row() {
            local action="$1"
            local address="$2"
            local monthly_estimate="$3"
            local tier="$4"
            local notes="$5"
            echo "| **$action** | \`$address\` | $monthly_estimate | $tier | $notes |" >> /tmp/cost-impact.md
            if [[ "$monthly_estimate" =~ ^(-?)£([0-9]+\.?[0-9]*)$ ]]; then
              if [[ "${BASH_REMATCH[1]}" == "-" ]]; then
                TOTAL_FIXED=$(awk -v a="$TOTAL_FIXED" -v b="${BASH_REMATCH[2]}" 'BEGIN { printf "%.2f", a - b }')
              else
                TOTAL_FIXED=$(awk -v a="$TOTAL_FIXED" -v b="${BASH_REMATCH[2]}" 'BEGIN { printf "%.2f", a + b }')
              fi
            elif [[ "$monthly_estimate" == Not\ estimated* ]]; then
              HAS_GAPS=1
            else
              HAS_VARIABLE=1
            fi
          }

          add_zero_cost_resource() {
            local action="$1"
            local address="$2"
            local tier="$3"
            local notes="$4"
            append_cost_row "$action" "$address" "£0.00" "$tier" "$notes"
          }

          record_unestimated_resource() {
            local action="$1"
            local address="$2"
            local tier="$3"
            local notes="$4"
            append_cost_row "$action" "$address" "Not estimated" "$tier" "$notes"
          }

          retail_query() {
            local filter="$1"
            curl -s "${RETAIL_API}&\$filter=${filter}" 2>/dev/null
          }

          first_matching_field() {
            local json_input="$1"
            local jq_filter="$2"
            echo "$json_input" | jq -r "$jq_filter" | head -1
          }

          record_storage_account() {
            local resource_type="$1"
            local resource_name="$2"
            local action="$3"
            local address="$resource_type.$resource_name"
            local storage_tier storage_replication storage_json storage_price storage_meter storage_unit storage_monthly old_storage_tier old_storage_replication old_storage_json old_storage_price old_storage_monthly

            storage_tier=$(tf_attr_for_address "$resource_type" "$resource_name" "account_tier")
            storage_replication=$(tf_attr_for_address "$resource_type" "$resource_name" "account_replication_type")

            if [[ "$storage_tier" == "Premium" && "$storage_replication" == "LRS" ]]; then
              storage_json=$(retail_query "serviceName%20eq%20'Storage'%20and%20armRegionName%20eq%20'${ANALYSIS_AZURE_REGION}'%20and%20contains(productName,'Premium%20Block%20Blob')%20and%20contains(skuName,'Premium%20LRS')%20and%20contains(meterName,'Data%20Stored')")
            elif [[ "$storage_tier" == "Standard" && "$storage_replication" == "LRS" ]]; then
              storage_json=$(retail_query "serviceName%20eq%20'Storage'%20and%20armRegionName%20eq%20'${ANALYSIS_AZURE_REGION}'%20and%20contains(productName,'General%20Block%20Blob%20v2')%20and%20contains(skuName,'Hot%20LRS')%20and%20contains(meterName,'Data%20Stored')")
            else
              record_unestimated_resource "$action" "$address" "${storage_tier}_${storage_replication}" "No pricing rule is configured yet for this storage tier and replication combination."
              return
            fi

            storage_price=$(first_matching_field "$storage_json" '.Items[] | select(.type == "Consumption") | .unitPrice')
            storage_meter=$(first_matching_field "$storage_json" '.Items[] | select(.type == "Consumption") | .meterName')
            storage_unit=$(first_matching_field "$storage_json" '.Items[] | select(.type == "Consumption") | .unitOfMeasure')

            if [[ -n "$storage_price" && "$storage_price" != "null" ]]; then
              storage_monthly=$(awk -v p="$storage_price" -v gb="$STORAGE_ASSUMED_GB_MONTH" 'BEGIN { printf "£%.2f", p * gb }')
              append_price_row "$resource_type" "$storage_meter" "£$storage_price" "$storage_unit" "$storage_monthly" "Assumes ${STORAGE_ASSUMED_GB_MONTH} GB-Month. Monthly estimate is calculated as £$storage_price x ${STORAGE_ASSUMED_GB_MONTH}."
              if [[ "$action" == "Modified" ]]; then
                old_storage_tier=$(tf_attr_in_dir "$BASE_TF_DIR" "$resource_type" "$resource_name" "account_tier")
                old_storage_replication=$(tf_attr_in_dir "$BASE_TF_DIR" "$resource_type" "$resource_name" "account_replication_type")
                if [[ "$old_storage_tier" == "Premium" && "$old_storage_replication" == "LRS" ]]; then
                  old_storage_json=$(retail_query "serviceName%20eq%20'Storage'%20and%20armRegionName%20eq%20'${ANALYSIS_AZURE_REGION}'%20and%20contains(productName,'Premium%20Block%20Blob')%20and%20contains(skuName,'Premium%20LRS')%20and%20contains(meterName,'Data%20Stored')")
                elif [[ "$old_storage_tier" == "Standard" && "$old_storage_replication" == "LRS" ]]; then
                  old_storage_json=$(retail_query "serviceName%20eq%20'Storage'%20and%20armRegionName%20eq%20'${ANALYSIS_AZURE_REGION}'%20and%20contains(productName,'General%20Block%20Blob%20v2')%20and%20contains(skuName,'Hot%20LRS')%20and%20contains(meterName,'Data%20Stored')")
                fi
                old_storage_price=$(first_matching_field "$old_storage_json" '.Items[] | select(.type == "Consumption") | .unitPrice')
                if [[ -n "$old_storage_price" && "$old_storage_price" != "null" ]]; then
                  old_storage_monthly=$(awk -v p="$old_storage_price" -v gb="$STORAGE_ASSUMED_GB_MONTH" 'BEGIN { printf "%.2f", p * gb }')
                fi
              fi
              add_estimate_with_optional_delta "$action" "$address" "${storage_monthly#£}" "$old_storage_monthly" "${storage_tier}_${storage_replication}" "Assumes ${STORAGE_ASSUMED_GB_MONTH} GB-Month at £$storage_price per GB-Month from Azure Retail Prices."
            else
              record_unestimated_resource "$action" "$address" "${storage_tier}_${storage_replication}" "Retail pricing query did not return a usable storage price row."
            fi
          }

          record_service_plan() {
            local resource_type="$1"
            local resource_name="$2"
            local action="$3"
            local address="$resource_type.$resource_name"
            local app_service_sku app_service_os filter_sku app_json app_price app_meter app_unit app_monthly old_app_service_sku old_app_service_os old_filter_sku old_app_json old_app_price old_app_monthly

            app_service_sku=$(tf_attr_for_address "$resource_type" "$resource_name" "sku_name")
            app_service_os=$(tf_attr_for_address "$resource_type" "$resource_name" "os_type")
            filter_sku=$(echo "$app_service_sku" | sed 's/\([0-9]\)v\([0-9]\)/\1%20v\2/g')
            app_json=$(retail_query "serviceName%20eq%20'Azure%20App%20Service'%20and%20armRegionName%20eq%20'${ANALYSIS_AZURE_REGION}'%20and%20contains(skuName,'${filter_sku}')")

            if [[ "$app_service_os" == "Linux" ]]; then
              app_price=$(first_matching_field "$app_json" '.Items[] | select(.type == "Consumption" and (.productName | contains("Linux"))) | .unitPrice')
              app_meter=$(first_matching_field "$app_json" '.Items[] | select(.type == "Consumption" and (.productName | contains("Linux"))) | .meterName')
              app_unit=$(first_matching_field "$app_json" '.Items[] | select(.type == "Consumption" and (.productName | contains("Linux"))) | .unitOfMeasure')
            else
              app_price=$(first_matching_field "$app_json" '.Items[] | select(.type == "Consumption") | .unitPrice')
              app_meter=$(first_matching_field "$app_json" '.Items[] | select(.type == "Consumption") | .meterName')
              app_unit=$(first_matching_field "$app_json" '.Items[] | select(.type == "Consumption") | .unitOfMeasure')
            fi

            if [[ -n "$app_price" && "$app_price" != "null" ]]; then
              app_monthly=$(awk -v p="$app_price" -v h="$HOURS_PER_MONTH" 'BEGIN { printf "£%.2f", p * h }')
              append_price_row "$resource_type" "$app_meter" "£$app_price" "$app_unit" "$app_monthly" "Monthly estimate is calculated as £$app_price x ${HOURS_PER_MONTH} hours."
              if [[ "$action" == "Modified" ]]; then
                old_app_service_sku=$(tf_attr_in_dir "$BASE_TF_DIR" "$resource_type" "$resource_name" "sku_name")
                old_app_service_os=$(tf_attr_in_dir "$BASE_TF_DIR" "$resource_type" "$resource_name" "os_type")
                old_filter_sku=$(echo "$old_app_service_sku" | sed 's/\([0-9]\)v\([0-9]\)/\1%20v\2/g')
                old_app_json=$(retail_query "serviceName%20eq%20'Azure%20App%20Service'%20and%20armRegionName%20eq%20'${ANALYSIS_AZURE_REGION}'%20and%20contains(skuName,'${old_filter_sku}')")
                if [[ "$old_app_service_os" == "Linux" ]]; then
                  old_app_price=$(first_matching_field "$old_app_json" '.Items[] | select(.type == "Consumption" and (.productName | contains("Linux"))) | .unitPrice')
                else
                  old_app_price=$(first_matching_field "$old_app_json" '.Items[] | select(.type == "Consumption") | .unitPrice')
                fi
                if [[ -n "$old_app_price" && "$old_app_price" != "null" ]]; then
                  old_app_monthly=$(awk -v p="$old_app_price" -v h="$HOURS_PER_MONTH" 'BEGIN { printf "%.2f", p * h }')
                fi
              fi
              add_estimate_with_optional_delta "$action" "$address" "${app_monthly#£}" "$old_app_monthly" "$app_service_sku" "Live Azure retail price from meter $app_meter at £$app_price per hour."
            else
              record_unestimated_resource "$action" "$address" "$app_service_sku" "Retail pricing query did not return a usable App Service price row."
            fi
          }

          record_sql_database() {
            local resource_type="$1"
            local resource_name="$2"
            local action="$3"
            local address="$resource_type.$resource_name"
            local sql_sku sql_json sql_price sql_meter sql_unit sql_monthly old_sql_sku old_sql_json old_sql_price old_sql_monthly

            sql_sku=$(tf_attr_for_address "$resource_type" "$resource_name" "sku_name")
            sql_json=$(retail_query "serviceName%20eq%20'SQL%20Database'%20and%20armRegionName%20eq%20'${ANALYSIS_AZURE_REGION}'%20and%20skuName%20eq%20'${sql_sku}'")
            sql_price=$(first_matching_field "$sql_json" '.Items[] | select(.type == "Consumption") | .unitPrice')
            sql_meter=$(first_matching_field "$sql_json" '.Items[] | select(.type == "Consumption") | .meterName')
            sql_unit=$(first_matching_field "$sql_json" '.Items[] | select(.type == "Consumption") | .unitOfMeasure')

            if [[ -n "$sql_price" && "$sql_price" != "null" ]]; then
              sql_monthly=$(awk -v p="$sql_price" -v d="$DAYS_PER_MONTH" 'BEGIN { printf "£%.2f", p * d }')
              append_price_row "$resource_type" "$sql_meter" "£$sql_price" "$sql_unit" "$sql_monthly" "Monthly estimate is calculated as £$sql_price x ${DAYS_PER_MONTH} days."
              if [[ "$action" == "Modified" ]]; then
                old_sql_sku=$(tf_attr_in_dir "$BASE_TF_DIR" "$resource_type" "$resource_name" "sku_name")
                old_sql_json=$(retail_query "serviceName%20eq%20'SQL%20Database'%20and%20armRegionName%20eq%20'${ANALYSIS_AZURE_REGION}'%20and%20skuName%20eq%20'${old_sql_sku}'")
                old_sql_price=$(first_matching_field "$old_sql_json" '.Items[] | select(.type == "Consumption") | .unitPrice')
                if [[ -n "$old_sql_price" && "$old_sql_price" != "null" ]]; then
                  old_sql_monthly=$(awk -v p="$old_sql_price" -v d="$DAYS_PER_MONTH" 'BEGIN { printf "%.2f", p * d }')
                fi
              fi
              add_estimate_with_optional_delta "$action" "$address" "${sql_monthly#£}" "$old_sql_monthly" "$sql_sku" "Live Azure retail price from meter $sql_meter at £$sql_price per day."
            else
              record_unestimated_resource "$action" "$address" "$sql_sku" "Retail pricing query did not return a usable SQL Database price row."
            fi
          }

          record_redis_cache() {
            local resource_type="$1"
            local resource_name="$2"
            local action="$3"
