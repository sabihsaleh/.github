# Reusable Terraform Cost Analysis Workflow using Azure Native Tools + GitHub Copilot
# Uses: Azure CLI, Azure Cost Management, Azure Resource Graph, Azure Advisor
# NO Infracost required!
#
# Usage in other repos:
#   jobs:
#     cost-analysis:
#       uses: YOUR_ORG/.github/.github/workflows/terraform-cost-analysis-reusable.yml@main
#       with:
#         terraform_directory: infra
#       secrets:
#         AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
#         AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
#         AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

name: Terraform Cost Analysis (Azure Native + Copilot)

on:
  workflow_call:
    inputs:
      terraform_directory:
        description: 'Path to Terraform directory'
        required: false
        type: string
        default: 'infra'
      required_tags:
        description: 'Comma-separated list of required tags'
        required: false
        type: string
        default: 'Environment,Project,Owner,CostCenter,ManagedBy'
      azure_region:
        description: 'Azure region for cost estimation reference'
        required: false
        type: string
        default: 'northeurope'
      fail_on_missing_tags:
        description: 'Fail the workflow if required tags are missing'
        required: false
        type: boolean
        default: false
      cost_threshold:
        description: 'Monthly cost threshold in GBP (0 = disabled)'
        required: false
        type: number
        default: 0
      ai_model:
        description: 'GitHub Models AI model to use'
        required: false
        type: string
        default: 'gpt-4o'
      run_azure_advisor:
        description: 'Fetch Azure Advisor cost recommendations'
        required: false
        type: boolean
        default: true
      check_orphaned_resources:
        description: 'Check for orphaned/unused resources'
        required: false
        type: boolean
        default: true
    secrets:
      AZURE_CLIENT_ID:
        description: 'Azure Service Principal Client ID'
        required: true
      AZURE_TENANT_ID:
        description: 'Azure Tenant ID'
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: 'Azure Subscription ID'
        required: true
      AZURE_CLIENT_SECRET:
        description: 'Azure Service Principal Client Secret'
        required: true
      MODEL_ACCES:
        description: 'PAT with models:read scope for GitHub Models API (optional)'
        required: false

permissions:
  contents: read
  pull-requests: write
  id-token: write
  models: read

jobs:
  analyze:
    name: Azure Cost Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref || github.event.repository.default_branch || 'main' }}
          path: base

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # Azure Login using Service Principal
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Install Azure CLI Extensions
        run: |
          az extension add --name costmanagement --yes || true
          az extension add --name resource-graph --yes || true
          az extension add --name advisor --yes || true

      - name: Check for Terraform files
        id: check_files
        run: |
          if find "${{ inputs.terraform_directory }}" -name "*.tf" -type f 2>/dev/null | grep -q .; then
            echo "has_tf_files=true" >> $GITHUB_OUTPUT
          else
            echo "has_tf_files=false" >> $GITHUB_OUTPUT
            echo "::warning::No Terraform files found in ${{ inputs.terraform_directory }}"
          fi

      - name: Get Changed Files
        if: steps.check_files.outputs.has_tf_files == 'true'
        id: changed_files
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref || github.event.repository.default_branch || 'main' }}"
          CHANGED_FILES=$(git diff --name-only origin/${BASE_REF} -- '*.tf' '*.tfvars' | tr '\n' ' ')
          echo "files=$CHANGED_FILES" >> $GITHUB_OUTPUT
          git diff origin/${BASE_REF} -- '*.tf' '*.tfvars' > /tmp/terraform-diff.txt

      - name: Collect Terraform Content
        if: steps.check_files.outputs.has_tf_files == 'true'
        run: |
          echo "=== PR BRANCH TERRAFORM FILES ===" > /tmp/pr-terraform.txt
          find "${{ inputs.terraform_directory }}" -name "*.tf" -exec echo "--- {} ---" \; -exec cat {} \; >> /tmp/pr-terraform.txt 2>/dev/null || true
          
          echo "=== BASE BRANCH TERRAFORM FILES ===" > /tmp/base-terraform.txt
          find "base/${{ inputs.terraform_directory }}" -name "*.tf" -exec echo "--- {} ---" \; -exec cat {} \; >> /tmp/base-terraform.txt 2>/dev/null || true

      - name: Run Terraform Plan (PR Branch)
        if: steps.check_files.outputs.has_tf_files == 'true'
        id: tf_plan
        run: |
          cd "${{ inputs.terraform_directory }}"
          terraform init -backend=false
          terraform plan -no-color -out=tfplan 2>&1 | tee /tmp/terraform-plan.txt || true
          terraform show -no-color tfplan > /tmp/terraform-plan-details.txt 2>&1 || true
        continue-on-error: true

      # Get Azure Pricing for resources in Terraform
      - name: Get Azure Pricing Info
        if: steps.check_files.outputs.has_tf_files == 'true'
        id: azure_pricing
        env:
          ANALYSIS_AZURE_REGION: ${{ inputs.azure_region }}
          ANALYSIS_TERRAFORM_DIRECTORY: ${{ inputs.terraform_directory }}
        run: |
          echo "## Azure Resource Pricing Reference" > /tmp/azure-pricing.md
          echo "### 💰 Cost Impact Analysis" > /tmp/cost-impact.md
          echo "| Change | Resource | Est. Monthly Cost | Azure SKU/Tier | Notes |" >> /tmp/cost-impact.md
          echo "|--------|----------|-------------------|----------------|-------|" >> /tmp/cost-impact.md
          echo "" >> /tmp/azure-pricing.md
          echo "Region: $ANALYSIS_AZURE_REGION" >> /tmp/azure-pricing.md
          echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> /tmp/azure-pricing.md
          echo "" >> /tmp/azure-pricing.md

          RETAIL_API="https://prices.azure.com/api/retail/prices?api-version=2023-01-01-preview"
          TF_DIR="$ANALYSIS_TERRAFORM_DIRECTORY"
          BASE_TF_DIR="base/$ANALYSIS_TERRAFORM_DIRECTORY"
          HOURS_PER_MONTH=730
          DAYS_PER_MONTH=30
          TOTAL_FIXED=0
          HAS_VARIABLE=0
          HAS_GAPS=0
          STORAGE_ASSUMED_GB_MONTH=756
          APP_INSIGHTS_ASSUMED_GB_MONTH=30
          LOG_ANALYTICS_ASSUMED_GB_MONTH=30
          CONTAINER_REGISTRY_ASSUMED_GB_MONTH=50
          SERVICE_BUS_BASIC_ASSUMED_OPERATIONS_MILLIONS=5
          APIM_CONSUMPTION_ASSUMED_10K_CALLS=100
          KEY_VAULT_ASSUMED_10K_OPERATIONS=1
          AKS_DEFAULT_NODE_COUNT=1
          GENERIC_STORAGE_ASSUMED_GB_MONTH=50
          GENERIC_10K_UNITS_ASSUMED_PER_MONTH=100
          COSMOS_ASSUMED_RU_PER_SEC=400

          tf_attr_in_dir() {
            local dir_path="$1"
            local resource_type="$2"
            local resource_name="$3"
            local attr_name="$4"
            awk -v resource_type="$resource_type" -v resource_name="$resource_name" -v attr_name="$attr_name" '
              $0 ~ "^resource \"" resource_type "\" \"" resource_name "\"" { in_block = 1; depth = 0 }
              in_block {
                open_count = gsub(/\{/, "&")
                close_count = gsub(/\}/, "&")
                depth += open_count - close_count
                if ($0 ~ "^[[:space:]]*" attr_name "[[:space:]]*=") {
                  value = $0
                  sub(/^[^=]*=[[:space:]]*/, "", value)
                  gsub(/^"|"$/, "", value)
                  print value
                  exit
                }
                if (depth <= 0) {
                  in_block = 0
                }
              }
            ' "$dir_path"/*.tf 2>/dev/null | head -1
          }

          tf_attr_for_address() {
            local resource_type="$1"
            local resource_name="$2"
            local attr_name="$3"
            tf_attr_in_dir "$TF_DIR" "$resource_type" "$resource_name" "$attr_name"
          }

          resource_inventory() {
            awk '
              /^resource "/ {
                line = $0
                sub(/^resource "/, "", line)
                split(line, parts, /" "/)
                resource_type = parts[1]
                resource_name = parts[2]
                sub(/".*/, "", resource_name)
                print resource_type "|" resource_name
              }
            ' "$TF_DIR"/*.tf 2>/dev/null | sort -u
          }

          resource_exists_in_dir() {
            local dir_path="$1"
            local resource_type="$2"
            local resource_name="$3"
            grep -h -q "^resource \"${resource_type}\" \"${resource_name}\"" "$dir_path"/*.tf 2>/dev/null
          }

          resource_block_checksum_in_dir() {
            local dir_path="$1"
            local resource_type="$2"
            local resource_name="$3"
            local block
            block=$(awk -v resource_type="$resource_type" -v resource_name="$resource_name" '
              $0 ~ "^resource \"" resource_type "\" \"" resource_name "\"" { in_block = 1; depth = 0 }
              in_block {
                print
                open_count = gsub(/\{/, "&")
                close_count = gsub(/\}/, "&")
                depth += open_count - close_count
                if (depth <= 0) {
                  exit
                }
              }
            ' "$dir_path"/*.tf 2>/dev/null)

            if [[ -n "$block" ]]; then
              printf '%s' "$block" | shasum -a 256 | awk '{print $1}'
            fi
          }

          plan_action() {
            local address="$1"
            local resource_type="${address%%.*}"
            local resource_name="${address#*.}"
            local pr_exists=1
            local base_exists=1
            local pr_checksum
            local base_checksum

            if grep -q "^# ${address} will be created" /tmp/terraform-plan.txt 2>/dev/null; then
              echo "Added"
            elif grep -q "^# ${address} will be updated in-place" /tmp/terraform-plan.txt 2>/dev/null; then
              echo "Modified"
            elif grep -q "^# ${address} must be replaced" /tmp/terraform-plan.txt 2>/dev/null; then
              echo "Modified"
            elif grep -q "^# ${address} will be destroyed" /tmp/terraform-plan.txt 2>/dev/null; then
              echo "Removed"
            else
              resource_exists_in_dir "$TF_DIR" "$resource_type" "$resource_name" || pr_exists=0
              resource_exists_in_dir "$BASE_TF_DIR" "$resource_type" "$resource_name" || base_exists=0

              if [[ "$pr_exists" -eq 1 && "$base_exists" -eq 0 ]]; then
                echo "Added"
                return
              fi

              if [[ "$pr_exists" -eq 1 && "$base_exists" -eq 1 ]]; then
                pr_checksum=$(resource_block_checksum_in_dir "$TF_DIR" "$resource_type" "$resource_name")
                base_checksum=$(resource_block_checksum_in_dir "$BASE_TF_DIR" "$resource_type" "$resource_name")
                if [[ -n "$pr_checksum" && -n "$base_checksum" && "$pr_checksum" != "$base_checksum" ]]; then
                  echo "Modified"
                  return
                fi
              fi

              echo ""
            fi
          }

          format_delta_estimate() {
            local new_amount="$1"
            local old_amount="$2"
            awk -v new_amount="$new_amount" -v old_amount="$old_amount" 'BEGIN {
              diff = new_amount - old_amount
              if (diff < 0) {
                printf "-£%.2f", -diff
              } else {
                printf "£%.2f", diff
              }
            }'
          }

          add_estimate_with_optional_delta() {
            local action="$1"
            local address="$2"
            local new_amount="$3"
            local old_amount="$4"
            local tier="$5"
            local notes="$6"
            local estimate="£${new_amount}"

            if [[ "$action" == "Modified" && -n "$old_amount" ]]; then
              estimate=$(format_delta_estimate "$new_amount" "$old_amount")
            fi

            append_cost_row "$action" "$address" "$estimate" "$tier" "$notes"
          }

          append_price_row() {
            local resource_label="$1"
            local source_label="$2"
            local price="$3"
            local unit="$4"
            local monthly_estimate="$5"
            local notes="$6"
            echo "| $resource_label | $source_label | $price | $unit | $monthly_estimate | $notes |" >> /tmp/azure-pricing.md
          }

          append_cost_row() {
            local action="$1"
            local address="$2"
            local monthly_estimate="$3"
            local tier="$4"
            local notes="$5"
            echo "| **$action** | \`$address\` | $monthly_estimate | $tier | $notes |" >> /tmp/cost-impact.md
            if [[ "$monthly_estimate" =~ ^(-?)£([0-9]+\.?[0-9]*)$ ]]; then
              if [[ "${BASH_REMATCH[1]}" == "-" ]]; then
                TOTAL_FIXED=$(awk -v a="$TOTAL_FIXED" -v b="${BASH_REMATCH[2]}" 'BEGIN { printf "%.2f", a - b }')
              else
                TOTAL_FIXED=$(awk -v a="$TOTAL_FIXED" -v b="${BASH_REMATCH[2]}" 'BEGIN { printf "%.2f", a + b }')
              fi
            elif [[ "$monthly_estimate" == Not\ estimated* ]]; then
              HAS_GAPS=1
            else
              HAS_VARIABLE=1
            fi
          }

          add_zero_cost_resource() {
            local action="$1"
            local address="$2"
            local tier="$3"
            local notes="$4"
            append_cost_row "$action" "$address" "£0.00" "$tier" "$notes"
          }

          record_unestimated_resource() {
            local action="$1"
            local address="$2"
            local tier="$3"
            local notes="$4"
            append_cost_row "$action" "$address" "Not estimated" "$tier" "$notes"
          }

          retail_query() {
            local filter="$1"
            curl -s "${RETAIL_API}&\$filter=${filter}" 2>/dev/null
          }

          first_matching_field() {
            local json_input="$1"
            local jq_filter="$2"
            echo "$json_input" | jq -r "$jq_filter" | head -1
          }


          # ================================================================
          # DYNAMIC PRICING ENGINE
          # Replaces hardcoded per-resource handlers with a single engine
          # that extracts attributes from Terraform files, builds dynamic
          # Azure Retail Prices API queries, and uses smart meter selection.
          # ================================================================

          # --- Service Name Resolution ---
          # Maps azurerm_ resource types to the Azure Retail Prices serviceName
          resolve_service() {
            local rt="$1"
            case "$rt" in
              azurerm_storage_account)                         echo "Storage" ;;
              azurerm_service_plan)                            echo "Azure App Service" ;;
              azurerm_mssql_database|azurerm_sql_database)     echo "SQL Database" ;;
              azurerm_redis_cache)                             echo "Redis Cache" ;;
              azurerm_application_insights)                    echo "Application Insights" ;;
              azurerm_key_vault)                               echo "Key Vault" ;;
              azurerm_kubernetes_cluster)                      echo "Virtual Machines" ;;
              azurerm_linux_virtual_machine|azurerm_windows_virtual_machine|azurerm_virtual_machine) echo "Virtual Machines" ;;
              azurerm_api_management)                          echo "API Management" ;;
              azurerm_servicebus_namespace)                    echo "Service Bus" ;;
              azurerm_cosmosdb_sql_database|azurerm_cosmosdb_sql_container|azurerm_cosmosdb_mongo_database|azurerm_cosmosdb_mongo_collection)
                                                              echo "Azure Cosmos DB" ;;
              azurerm_container_registry)                      echo "Container Registry" ;;
              azurerm_log_analytics_workspace)                 echo "Log Analytics" ;;
              azurerm_public_ip)                               echo "Virtual Network" ;;
              azurerm_application_gateway)                     echo "Application Gateway" ;;
              azurerm_lb)                                      echo "Load Balancer" ;;
              azurerm_nat_gateway)                             echo "NAT Gateway" ;;
              azurerm_firewall)                                echo "Azure Firewall" ;;
              azurerm_cognitive_account)                       echo "Cognitive Services" ;;
              azurerm_search_service)                          echo "Azure Cognitive Search" ;;
              azurerm_signalr_service)                         echo "SignalR" ;;
              azurerm_eventhub_namespace)                      echo "Event Hubs" ;;
              azurerm_cdn_endpoint|azurerm_cdn_profile)        echo "Content Delivery Network" ;;
              azurerm_frontdoor|azurerm_frontdoor_firewall_policy) echo "Azure Front Door Service" ;;
              azurerm_dns_zone|azurerm_private_dns_zone)       echo "Azure DNS" ;;
              azurerm_bastion_host)                            echo "Azure Bastion" ;;
              azurerm_vpn_gateway)                             echo "VPN Gateway" ;;
              azurerm_data_factory)                            echo "Azure Data Factory v2" ;;
              azurerm_databricks_workspace)                    echo "Azure Databricks" ;;
              azurerm_mysql_flexible_server)                   echo "Azure Database for MySQL" ;;
              azurerm_postgresql_flexible_server)              echo "Azure Database for PostgreSQL" ;;
              azurerm_function_app|azurerm_linux_function_app|azurerm_windows_function_app) echo "Functions" ;;
              azurerm_container_app)                           echo "Azure Container Apps" ;;
              azurerm_monitor_action_group|azurerm_monitor_metric_alert) echo "Azure Monitor" ;;
              *)
                local derived
                derived=$(echo "$rt" | sed 's/^azurerm_//' | tr '_' ' ' | awk '{for(i=1;i<=NF;i++){$i=toupper(substr($i,1,1))tolower(substr($i,2))}print}')
                echo "Azure $derived"
                ;;
            esac
          }

          # --- SKU Term Builder ---
          # Extracts Terraform attributes and builds the API-compatible SKU search term
          build_sku_term() {
            local rt="$1" rn="$2" dir="$3"
            local val

            case "$rt" in
              azurerm_storage_account)
                local tier=$(tf_attr_in_dir "$dir" "$rt" "$rn" "account_tier")
                local repl=$(tf_attr_in_dir "$dir" "$rt" "$rn" "account_replication_type")
                local access=$(tf_attr_in_dir "$dir" "$rt" "$rn" "access_tier")
                tier="${tier:-Standard}"
                repl="${repl:-LRS}"
                access="${access:-Hot}"
                if [[ "$tier" == "Premium" ]]; then
                  echo "Premium $repl"
                else
                  echo "$access $repl"
                fi
                ;;
              azurerm_redis_cache)
                local family=$(tf_attr_in_dir "$dir" "$rt" "$rn" "family")
                local cap=$(tf_attr_in_dir "$dir" "$rt" "$rn" "capacity")
                echo "${family:-C}${cap:-1}"
                ;;
              azurerm_kubernetes_cluster)
                tf_attr_in_dir "$dir" "$rt" "$rn" "vm_size"
                ;;
              azurerm_linux_virtual_machine|azurerm_windows_virtual_machine|azurerm_virtual_machine)
                val=$(tf_attr_in_dir "$dir" "$rt" "$rn" "size")
                [[ -z "$val" ]] && val=$(tf_attr_in_dir "$dir" "$rt" "$rn" "vm_size")
                echo "$val"
                ;;
              azurerm_service_plan)
                local sku=$(tf_attr_in_dir "$dir" "$rt" "$rn" "sku_name")
                echo "$sku" | sed 's/\([0-9]\)v\([0-9]\)/\1 v\2/g'
                ;;
              azurerm_api_management)
                local sku_name=$(tf_attr_in_dir "$dir" "$rt" "$rn" "sku_name")
                local tier="${sku_name%%_*}"
                case "$tier" in
                  BasicV2)    echo "Basic v2" ;;
                  StandardV2) echo "Standard v2" ;;
                  PremiumV2)  echo "Premium v2" ;;
                  *)          echo "$tier" ;;
                esac
                ;;
              azurerm_key_vault)
                local sku=$(tf_attr_in_dir "$dir" "$rt" "$rn" "sku_name")
                sku="${sku:-standard}"
                echo "$sku" | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}'
                ;;
              azurerm_application_insights)
                echo "Enterprise"
                ;;
              azurerm_cosmosdb_sql_database|azurerm_cosmosdb_sql_container|azurerm_cosmosdb_mongo_database|azurerm_cosmosdb_mongo_collection)
                echo ""
                ;;
              azurerm_servicebus_namespace)
                tf_attr_in_dir "$dir" "$rt" "$rn" "sku"
                ;;
              azurerm_mssql_database|azurerm_sql_database)
                tf_attr_in_dir "$dir" "$rt" "$rn" "sku_name"
                ;;
              azurerm_container_registry)
                tf_attr_in_dir "$dir" "$rt" "$rn" "sku"
                ;;
              azurerm_log_analytics_workspace)
                tf_attr_in_dir "$dir" "$rt" "$rn" "sku"
                ;;
              azurerm_mysql_flexible_server|azurerm_postgresql_flexible_server)
                tf_attr_in_dir "$dir" "$rt" "$rn" "sku_name"
                ;;
              *)
                for attr in sku_name sku tier service_tier size vm_size; do
                  val=$(tf_attr_in_dir "$dir" "$rt" "$rn" "$attr")
                  if [[ -n "$val" ]]; then
                    echo "$val"
                    return
                  fi
                done
                ;;
            esac
          }

          # --- Product Name Hint ---
          # Returns keywords to match in productName for more accurate results
          build_product_hint() {
            local rt="$1" rn="$2" dir="$3"
            case "$rt" in
              azurerm_storage_account)
                local tier=$(tf_attr_in_dir "$dir" "$rt" "$rn" "account_tier")
                if [[ "${tier:-Standard}" == "Premium" ]]; then
                  echo "premium block blob"
                else
                  echo "general block blob"
                fi
                ;;
              azurerm_service_plan)
                local os=$(tf_attr_in_dir "$dir" "$rt" "$rn" "os_type")
                [[ "${os:-Linux}" == "Linux" ]] && echo "linux"
                [[ "$os" == "Windows" ]] && echo "windows"
                ;;
              azurerm_redis_cache)
                local sku=$(tf_attr_in_dir "$dir" "$rt" "$rn" "sku_name")
                echo "${sku:-Standard}" | tr '[:upper:]' '[:lower:]'
                ;;
              azurerm_kubernetes_cluster|azurerm_linux_virtual_machine)
                echo "linux"
                ;;
              azurerm_windows_virtual_machine)
                echo "windows"
                ;;
              *) echo "" ;;
            esac
          }

          # --- Meter Preference Hint ---
          # Returns keywords to prefer when selecting the pricing meter
          build_meter_hint() {
            local rt="$1"
            case "$rt" in
              azurerm_storage_account)         echo "data stored" ;;
              azurerm_application_insights)    echo "data retention,enterprise overage data" ;;
              azurerm_key_vault)               echo "operations" ;;
              azurerm_redis_cache)             echo "cache" ;;
              azurerm_cosmosdb_*)              echo "100 ru" ;;
              azurerm_servicebus_namespace)    echo "messaging,base unit" ;;
              azurerm_log_analytics_workspace) echo "data ingestion" ;;
              azurerm_container_registry)      echo "registry unit" ;;
              *)                               echo "" ;;
            esac
          }

          # --- Meter Exclusion Keywords ---
          # Returns comma-separated terms to exclude from meterName matching
          build_meter_exclude() {
            local rt="$1"
            case "$rt" in
              azurerm_key_vault)     echo "advanced,hsm,managed hsm" ;;
              azurerm_kubernetes_cluster|azurerm_linux_virtual_machine|azurerm_virtual_machine)
                                     echo "spot,low priority" ;;
              azurerm_api_management) echo "secondary" ;;
              *)                     echo "spot,low priority" ;;
            esac
          }

          # --- Product Exclusion Keywords ---
          # Returns comma-separated terms to exclude from productName matching
          build_product_exclude() {
            local rt="$1"
            case "$rt" in
              azurerm_kubernetes_cluster|azurerm_linux_virtual_machine|azurerm_virtual_machine)
                echo "windows" ;;
              azurerm_windows_virtual_machine)
                echo "linux" ;;
              *) echo "dev/test" ;;
            esac
          }

          # --- Instance Count / Capacity Multiplier ---
          # Returns the number of instances/units for the resource
          get_instance_count() {
            local rt="$1" rn="$2" dir="$3"
            case "$rt" in
              azurerm_kubernetes_cluster)
                local count=$(tf_attr_in_dir "$dir" "$rt" "$rn" "node_count")
                echo "${count:-$AKS_DEFAULT_NODE_COUNT}"
                ;;
              azurerm_api_management)
                local sku_name=$(tf_attr_in_dir "$dir" "$rt" "$rn" "sku_name")
                local cap="${sku_name##*_}"
                [[ "$cap" == "$sku_name" || -z "$cap" ]] && cap=1
                echo "$cap"
                ;;
              azurerm_servicebus_namespace)
                local sku=$(tf_attr_in_dir "$dir" "$rt" "$rn" "sku")
                if [[ "$sku" == "Premium" ]]; then
                  local cap=$(tf_attr_in_dir "$dir" "$rt" "$rn" "capacity")
                  echo "${cap:-1}"
                else
                  echo "1"
                fi
                ;;
              azurerm_cosmosdb_sql_database|azurerm_cosmosdb_sql_container|azurerm_cosmosdb_mongo_database|azurerm_cosmosdb_mongo_collection)
                local throughput=$(tf_attr_in_dir "$dir" "$rt" "$rn" "throughput")
                local max_throughput=$(tf_attr_in_dir "$dir" "$rt" "$rn" "max_throughput")
                if [[ -n "$max_throughput" ]]; then
                  awk -v t="$max_throughput" 'BEGIN{printf "%.0f", t/100}'
                elif [[ -n "$throughput" ]]; then
                  awk -v t="$throughput" 'BEGIN{printf "%.0f", t/100}'
                else
                  awk -v t="$COSMOS_ASSUMED_RU_PER_SEC" 'BEGIN{printf "%.0f", t/100}'
                fi
                ;;
              *)
                echo "1"
                ;;
            esac
          }

          # --- Usage Assumption ---
          # Returns "quantity|unit_label" for the unit of measure
          get_usage_assumption() {
            local rt="$1" uom_lower="$2" meter_lower="$3"

            if [[ "$uom_lower" == *"hour"* ]]; then
              echo "$HOURS_PER_MONTH|hours"
              return
            fi
            if [[ "$uom_lower" == *"day"* ]]; then
              echo "$DAYS_PER_MONTH|days"
              return
            fi
            if [[ "$uom_lower" == *"/month"* || "$uom_lower" == *"1/month"* || "$uom_lower" == "1" ]]; then
              echo "1|month"
              return
            fi
            if [[ "$uom_lower" == *"gb"* ]] || [[ "$meter_lower" == *"data stored"* ]] || [[ "$meter_lower" == *"data retention"* ]] || [[ "$meter_lower" == *"data ingestion"* ]]; then
              case "$rt" in
                azurerm_storage_account)        echo "$STORAGE_ASSUMED_GB_MONTH|GB" ;;
                azurerm_application_insights)   echo "$APP_INSIGHTS_ASSUMED_GB_MONTH|GB" ;;
                azurerm_log_analytics_workspace) echo "${LOG_ANALYTICS_ASSUMED_GB_MONTH:-5}|GB" ;;
                azurerm_container_registry)     echo "${CONTAINER_REGISTRY_ASSUMED_GB_MONTH:-10}|GB" ;;
                *)                              echo "$GENERIC_STORAGE_ASSUMED_GB_MONTH|GB" ;;
              esac
              return
            fi
            if [[ "$uom_lower" == *"10k"* || "$uom_lower" == *"10,000"* ]] || [[ "$meter_lower" == *"operation"* ]] || [[ "$meter_lower" == *"call"* ]] || [[ "$meter_lower" == *"request"* ]] || [[ "$meter_lower" == *"transaction"* ]]; then
              case "$rt" in
                azurerm_key_vault)      echo "$KEY_VAULT_ASSUMED_10K_OPERATIONS|10K ops" ;;
                azurerm_api_management) echo "${APIM_CONSUMPTION_ASSUMED_10K_CALLS:-500}|10K calls" ;;
                azurerm_servicebus_namespace) echo "${SERVICE_BUS_BASIC_ASSUMED_OPERATIONS_MILLIONS:-1}0|10K ops" ;;
                *)                      echo "$GENERIC_10K_UNITS_ASSUMED_PER_MONTH|10K units" ;;
              esac
              return
            fi
            if [[ "$meter_lower" == *"100 ru"* ]]; then
              echo "$HOURS_PER_MONTH|hours"
              return
            fi

            echo "1|unit"
          }

          # --- Smart Meter Selection ---
          # Uses jq to score and select the best pricing meter from API results
          select_best_meter() {
            local json="$1"
            local product_hint="$2"
            local meter_hint="$3"
            local meter_exclude="$4"
            local product_exclude="$5"

            echo "$json" | jq -r \
              --arg ph "${product_hint}" \
              --arg mh "${meter_hint}" \
              --arg me "${meter_exclude}" \
              --arg pe "${product_exclude}" '

              def trim: ltrimstr(" ") | rtrimstr(" ");

              def excluded_by($terms; $field):
                if ($terms | length) == 0 then false
                else
                  ($terms | split(",") | any(
                    . as $t | ($t | trim | ascii_downcase) as $term |
                    ($field | ascii_downcase | contains($term))
                  ))
                end;

              def matches_hint($hint; $field):
                if ($hint | length) == 0 then true
                else
                  ($hint | split(",") | any(
                    . as $h | ($h | trim | ascii_downcase) as $term |
                    ($field | ascii_downcase | contains($term))
                  ))
                end;

              def uom_priority:
                if   (.unitOfMeasure // "" | ascii_downcase | test("hour"))           then 0
                elif (.unitOfMeasure // "" | ascii_downcase | test("1/month|/month")) then 1
                elif (.unitOfMeasure // "" | ascii_downcase | test("day"))            then 2
                elif (.unitOfMeasure // "" | ascii_downcase | test("gb"))             then 3
                elif (.unitOfMeasure // "" | ascii_downcase | test("10k|10,000"))     then 4
                else 9
                end;

              def hint_score:
                (if matches_hint($ph; .productName // "") then 0 else 10 end) +
                (if matches_hint($mh; .meterName // "")   then 0 else 10 end);

              [.Items[]
                | select(.type == "Consumption")
                | select(excluded_by($me; .meterName // "") | not)
                | select(excluded_by($pe; .productName // "") | not)
                | select((.meterName // "" | ascii_downcase | contains("secondary")) | not)
              ]
              | sort_by(hint_score + uom_priority)
              | .[0]
            ' 2>/dev/null
          }

          # --- Build API Filter ---
          # Constructs the URL-encoded OData filter for the Retail Prices API
          build_api_filter() {
            local service="$1" sku_term="$2" rt="$3"
            local encoded_service
            encoded_service=$(printf '%s' "$service" | jq -sRr @uri)
            local filter="serviceName%20eq%20'${encoded_service}'%20and%20armRegionName%20eq%20'${ANALYSIS_AZURE_REGION}'"

            case "$rt" in
              azurerm_kubernetes_cluster|azurerm_linux_virtual_machine|azurerm_windows_virtual_machine|azurerm_virtual_machine)
                if [[ -n "$sku_term" ]]; then
                  filter+="%20and%20armSkuName%20eq%20'${sku_term}'"
                fi
                ;;
              azurerm_cosmosdb_sql_database|azurerm_cosmosdb_sql_container|azurerm_cosmosdb_mongo_database|azurerm_cosmosdb_mongo_collection)
                filter+="%20and%20contains(meterName,'100%20RU')"
                ;;
              *)
                if [[ -n "$sku_term" ]]; then
                  local encoded_sku
                  encoded_sku=$(printf '%s' "$sku_term" | jq -sRr @uri)
                  filter+="%20and%20contains(skuName,'${encoded_sku}')"
                fi
                ;;
            esac

            echo "$filter"
          }

          # --- Main Dynamic Estimator ---
          # Single function that handles ANY Azure resource type dynamically
          estimate_resource() {
            local resource_type="$1"
            local resource_name="$2"
            local action="$3"
            local address="$resource_type.$resource_name"

            # 1. Resolve Azure service name
            local service
            service=$(resolve_service "$resource_type")
            if [[ -z "$service" ]]; then
              record_unestimated_resource "$action" "$address" "$resource_type" "Cannot map to Azure service"
              return 0
            fi

            # 2. Build SKU search term from Terraform attributes
            local sku_term
            sku_term=$(build_sku_term "$resource_type" "$resource_name" "$TF_DIR")

            # 3. Get resource-specific hints and exclusions
            local product_hint meter_hint meter_exclude product_exclude instance_count
            product_hint=$(build_product_hint "$resource_type" "$resource_name" "$TF_DIR")
            meter_hint=$(build_meter_hint "$resource_type")
            meter_exclude=$(build_meter_exclude "$resource_type")
            product_exclude=$(build_product_exclude "$resource_type")
            instance_count=$(get_instance_count "$resource_type" "$resource_name" "$TF_DIR")

            # 4. Build and execute API query
            local filter api_result
            filter=$(build_api_filter "$service" "$sku_term" "$resource_type")
            api_result=$(retail_query "$filter")

            local item_count
            item_count=$(echo "$api_result" | jq '.Items | length' 2>/dev/null || echo "0")

            # 4b. Fallback: if no results, try without sku filter
            if [[ "$item_count" -eq 0 && -n "$sku_term" ]]; then
              local fallback_filter
              fallback_filter=$(build_api_filter "$service" "" "$resource_type")
              api_result=$(retail_query "$fallback_filter")
              item_count=$(echo "$api_result" | jq '.Items | length' 2>/dev/null || echo "0")
            fi

            if [[ "$item_count" -eq 0 ]]; then
              record_unestimated_resource "$action" "$address" "${sku_term:-$resource_type}" "No pricing data found for service '$service'"
              return 0
            fi

            # 5. Select the best pricing meter
            local selected
            selected=$(select_best_meter "$api_result" "$product_hint" "$meter_hint" "$meter_exclude" "$product_exclude")

            if [[ -z "$selected" || "$selected" == "null" ]]; then
              record_unestimated_resource "$action" "$address" "${sku_term:-$resource_type}" "No matching meter found for service '$service'"
              return 0
            fi

            # 6. Extract price details
            local unit_price meter_name unit_of_measure sku_label
            unit_price=$(echo "$selected" | jq -r '.unitPrice')
            meter_name=$(echo "$selected" | jq -r '.meterName')
            unit_of_measure=$(echo "$selected" | jq -r '.unitOfMeasure')
            sku_label=$(echo "$selected" | jq -r '.skuName')

            if [[ -z "$unit_price" || "$unit_price" == "null" || "$unit_price" == "0" ]]; then
              record_unestimated_resource "$action" "$address" "${sku_term:-$resource_type}" "Zero-priced meter returned"
              return 0
            fi

            # 7. Calculate monthly cost
            local uom_lower meter_lower usage_info quantity usage_unit monthly_amount
            uom_lower=$(echo "$unit_of_measure" | tr '[:upper:]' '[:lower:]')
            meter_lower=$(echo "$meter_name" | tr '[:upper:]' '[:lower:]')
            usage_info=$(get_usage_assumption "$resource_type" "$uom_lower" "$meter_lower")
            quantity="${usage_info%%|*}"
            usage_unit="${usage_info#*|}"

            monthly_amount=$(awk -v p="$unit_price" -v q="$quantity" -v n="$instance_count" 'BEGIN { printf "%.2f", p * q * n }')

            # 8. Build notes
            local notes="Dynamic lookup: ${service}, SKU ${sku_term:-auto}, meter ${meter_name}, ${quantity} ${usage_unit}"
            if [[ "$instance_count" -gt 1 ]]; then
              notes+=" x${instance_count} instances"
            fi

            # 9. Record the price row
            append_price_row "$resource_type" "$meter_name" "£$unit_price" "$unit_of_measure" "£$monthly_amount" "$notes"

            # 10. Handle Modified resources — get old price for delta
            local old_monthly=""
            if [[ "$action" == "Modified" ]]; then
              local old_sku_term old_product_hint old_filter old_result old_item_count old_selected old_unit_price old_uom_lower old_meter_lower old_usage_info old_quantity old_instance_count
              old_sku_term=$(build_sku_term "$resource_type" "$resource_name" "$BASE_TF_DIR")
              old_product_hint=$(build_product_hint "$resource_type" "$resource_name" "$BASE_TF_DIR")
              old_instance_count=$(get_instance_count "$resource_type" "$resource_name" "$BASE_TF_DIR")

              if [[ -n "$old_sku_term" ]]; then
                old_filter=$(build_api_filter "$service" "$old_sku_term" "$resource_type")
                old_result=$(retail_query "$old_filter")
                old_item_count=$(echo "$old_result" | jq '.Items | length' 2>/dev/null || echo "0")

                if [[ "$old_item_count" -gt 0 ]]; then
                  old_selected=$(select_best_meter "$old_result" "$old_product_hint" "$meter_hint" "$meter_exclude" "$product_exclude")

                  if [[ -n "$old_selected" && "$old_selected" != "null" ]]; then
                    old_unit_price=$(echo "$old_selected" | jq -r '.unitPrice')
                    local old_uom old_meter
                    old_uom=$(echo "$old_selected" | jq -r '.unitOfMeasure')
                    old_meter=$(echo "$old_selected" | jq -r '.meterName')
                    old_uom_lower=$(echo "$old_uom" | tr '[:upper:]' '[:lower:]')
                    old_meter_lower=$(echo "$old_meter" | tr '[:upper:]' '[:lower:]')
                    old_usage_info=$(get_usage_assumption "$resource_type" "$old_uom_lower" "$old_meter_lower")
                    old_quantity="${old_usage_info%%|*}"
                    old_monthly=$(awk -v p="$old_unit_price" -v q="$old_quantity" -v n="$old_instance_count" 'BEGIN { printf "%.2f", p * q * n }')
                  fi
                fi
              fi
            fi

            add_estimate_with_optional_delta "$action" "$address" "$monthly_amount" "$old_monthly" "$sku_label" "$notes"
            return 0
          }

          # ================================================================
          # MAIN PRICING LOOP
          # ================================================================

          echo "### Live Retail Prices" >> /tmp/azure-pricing.md
          echo "| Resource | Azure Retail Meter | Unit Price | Unit | Monthly Estimate | Notes |" >> /tmp/azure-pricing.md
          echo "|----------|--------------------|------------|------|------------------|-------|" >> /tmp/azure-pricing.md

          while IFS='|' read -r resource_type resource_name; do
            [[ -z "$resource_type" || -z "$resource_name" ]] && continue
            resource_address="$resource_type.$resource_name"
            action=$(plan_action "$resource_address")
            [[ -z "$action" ]] && continue

            # --- Zero-cost networking and management resources ---
            case "$resource_type" in
              azurerm_resource_group)
                add_zero_cost_resource "$action" "$resource_address" "No direct base charge" "The resource group itself does not incur a direct Azure usage charge."
                continue
                ;;
              azurerm_virtual_network|azurerm_subnet|azurerm_network_security_group|azurerm_route_table|azurerm_network_security_rule)
                add_zero_cost_resource "$action" "$resource_address" "No direct base charge" "This networking resource does not have a standalone base Azure charge in this estimate."
                continue
                ;;
              azurerm_role_assignment|azurerm_management_lock|azurerm_monitor_diagnostic_setting|azurerm_key_vault_access_policy|azurerm_servicebus_namespace_authorization_rule|azurerm_user_assigned_identity)
                add_zero_cost_resource "$action" "$resource_address" "No direct base charge" "This resource configures access, policy, or diagnostics and does not add a separate base Azure usage charge."
                continue
                ;;
            esac

            # --- Bundled resources priced through parent ---
            case "$resource_type" in
              azurerm_linux_web_app|azurerm_windows_web_app)
                add_zero_cost_resource "$action" "$resource_address" "Included in App Service Plan" "The web app itself does not add a separate base compute charge beyond the plan."
                continue
                ;;
              azurerm_mssql_server|azurerm_sql_server)
                add_zero_cost_resource "$action" "$resource_address" "Included in SQL Database pricing" "The logical SQL server has no standalone base charge in this estimate."
                continue
                ;;
              azurerm_cosmosdb_account)
                add_zero_cost_resource "$action" "$resource_address" "No direct base charge" "The Cosmos DB account shell is not priced separately here; throughput, storage, and backup charges are estimated from child database or container resources."
                continue
                ;;
              azurerm_storage_container|azurerm_storage_queue|azurerm_storage_table|azurerm_storage_share)
                add_zero_cost_resource "$action" "$resource_address" "Included in Storage account pricing" "Capacity and transactions are billed through the parent storage account estimate rather than as a separate base charge."
                continue
                ;;
              azurerm_servicebus_queue|azurerm_servicebus_topic|azurerm_servicebus_subscription)
                add_zero_cost_resource "$action" "$resource_address" "Included in Service Bus namespace" "Entity pricing is included in the namespace estimate; usage and messaging charges are applied at the namespace level."
                continue
                ;;
            esac

            # --- Dynamic pricing for all other resources ---
            estimate_resource "$resource_type" "$resource_name" "$action"

          done < <(resource_inventory)

          echo "" >> /tmp/cost-impact.md
          if [[ "$HAS_GAPS" -eq 1 ]]; then
            echo "**Total Estimated Monthly Impact:** £${TOTAL_FIXED} + additional unsupported or usage-based components" >> /tmp/cost-impact.md
            echo "**Confidence Level:** Medium (derived from live Azure retail pricing where available, with unsupported resource types called out explicitly)" >> /tmp/cost-impact.md
          elif [[ "$HAS_VARIABLE" -eq 1 ]]; then
            echo "**Total Estimated Monthly Impact:** £${TOTAL_FIXED} + variable usage-based charges" >> /tmp/cost-impact.md
            echo "**Confidence Level:** High (derived from live Azure retail pricing, with usage-based resources called out explicitly)" >> /tmp/cost-impact.md
          else
            echo "**Total Estimated Monthly Impact:** £${TOTAL_FIXED} (increase)" >> /tmp/cost-impact.md
            echo "**Confidence Level:** High (derived from live Azure retail pricing for the configured region)" >> /tmp/cost-impact.md
          fi

          echo "" >> /tmp/azure-pricing.md
          RESOURCE_TYPES=$(grep -h "^resource \"azurerm_" "$TF_DIR"/*.tf 2>/dev/null | sed 's/resource "\([^"]*\)".*/\1/' | sort -u || true)
          echo "### Resources Found in Terraform:" >> /tmp/azure-pricing.md
          echo "$RESOURCE_TYPES" | while read -r rt; do
            if [ -n "$rt" ]; then
              echo "- \`$rt\`" >> /tmp/azure-pricing.md
            fi
          done
          echo "" >> /tmp/azure-pricing.md

      # Get Azure Advisor Cost Recommendations
      - name: Get Azure Advisor Recommendations
        if: steps.check_files.outputs.has_tf_files == 'true' && inputs.run_azure_advisor == true
        id: advisor
        run: |
          echo "## Azure Advisor Cost Recommendations" > /tmp/azure-advisor.md
          echo "" >> /tmp/azure-advisor.md
          
          RECOMMENDATIONS=$(az advisor recommendation list \
            --category Cost \
            --query "[].{impact:impact, problem:shortDescription.problem, solution:shortDescription.solution, resourceId:resourceMetadata.resourceId}" \
            --output json 2>/dev/null || echo "[]")
          
          if [ "$RECOMMENDATIONS" != "[]" ] && [ -n "$RECOMMENDATIONS" ]; then
            echo "$RECOMMENDATIONS" | jq -r '.[] | "### \(.impact) Impact\n- **Issue:** \(.problem)\n- **Solution:** \(.solution)\n- **Resource:** `\(.resourceId)`\n"' >> /tmp/azure-advisor.md 2>/dev/null || true
          else
            echo "No cost recommendations from Azure Advisor at this time." >> /tmp/azure-advisor.md
          fi
        continue-on-error: true

      # Check for Orphaned Resources using Azure Resource Graph
      - name: Check Orphaned Resources
        if: steps.check_files.outputs.has_tf_files == 'true' && inputs.check_orphaned_resources == true
        id: orphaned
        run: |
          echo "## Orphaned/Unused Resources Check" > /tmp/orphaned-resources.md
          echo "" >> /tmp/orphaned-resources.md
          
          # Check for unattached disks
          echo "### Unattached Disks" >> /tmp/orphaned-resources.md
          UNATTACHED_DISKS=$(az graph query -q "Resources | where type =~ 'microsoft.compute/disks' | where properties.diskState == 'Unattached' | project name, resourceGroup, sku=properties.sku.name, sizeGB=properties.diskSizeGB" --query "data" -o json 2>/dev/null || echo "[]")
          if [ "$UNATTACHED_DISKS" != "[]" ] && [ -n "$UNATTACHED_DISKS" ]; then
            echo "$UNATTACHED_DISKS" | jq -r '.[] | "- \(.name) (\(.sizeGB)GB, \(.sku)) in \(.resourceGroup)"' >> /tmp/orphaned-resources.md 2>/dev/null || echo "None found" >> /tmp/orphaned-resources.md
          else
            echo "None found" >> /tmp/orphaned-resources.md
          fi
          echo "" >> /tmp/orphaned-resources.md
          
          # Check for unused public IPs
          echo "### Unused Public IPs" >> /tmp/orphaned-resources.md
          UNUSED_IPS=$(az graph query -q "Resources | where type =~ 'microsoft.network/publicipaddresses' | where isnull(properties.ipConfiguration) | project name, resourceGroup, sku=sku.name" --query "data" -o json 2>/dev/null || echo "[]")
          if [ "$UNUSED_IPS" != "[]" ] && [ -n "$UNUSED_IPS" ]; then
            echo "$UNUSED_IPS" | jq -r '.[] | "- \(.name) (\(.sku)) in \(.resourceGroup)"' >> /tmp/orphaned-resources.md 2>/dev/null || echo "None found" >> /tmp/orphaned-resources.md
          else
            echo "None found" >> /tmp/orphaned-resources.md
          fi
          echo "" >> /tmp/orphaned-resources.md
          
          # Check for unused NICs
          echo "### Unused Network Interfaces" >> /tmp/orphaned-resources.md
          UNUSED_NICS=$(az graph query -q "Resources | where type =~ 'microsoft.network/networkinterfaces' | where isnull(properties.virtualMachine) | project name, resourceGroup" --query "data" -o json 2>/dev/null || echo "[]")
          if [ "$UNUSED_NICS" != "[]" ] && [ -n "$UNUSED_NICS" ]; then
            echo "$UNUSED_NICS" | jq -r '.[] | "- \(.name) in \(.resourceGroup)"' >> /tmp/orphaned-resources.md 2>/dev/null || echo "None found" >> /tmp/orphaned-resources.md
          else
            echo "None found" >> /tmp/orphaned-resources.md
          fi
        continue-on-error: true

      # Get Current Cost Summary (last 30 days)
      - name: Get Azure Cost Summary
        if: steps.check_files.outputs.has_tf_files == 'true'
        id: cost_summary
        run: |
          echo "## Current Azure Cost Summary (Last 30 Days)" > /tmp/azure-costs.md
          echo "" >> /tmp/azure-costs.md
          
          # Get cost by service
          START_DATE=$(date -d "30 days ago" +%Y-%m-%d 2>/dev/null || date -v-30d +%Y-%m-%d)
          END_DATE=$(date +%Y-%m-%d)
          
          COSTS=$(az consumption usage list \
            --start-date "$START_DATE" \
            --end-date "$END_DATE" \
            --query "[].{service:consumedService, cost:pretaxCost}" \
            --output json 2>/dev/null || echo "[]")
          
          if [ "$COSTS" != "[]" ] && [ -n "$COSTS" ] && [ "$COSTS" != "null" ]; then
            echo "| Service | Cost (GBP) |" >> /tmp/azure-costs.md
            echo "|---------|------------|" >> /tmp/azure-costs.md
            echo "$COSTS" | jq -r 'group_by(.service) | .[] | {service: .[0].service, total: (map(.cost) | add)} | "| \(.service) | £\(.total | tonumber | . * 100 | round / 100) |"' >> /tmp/azure-costs.md 2>/dev/null || true
          else
            echo "Cost data not available or requires additional permissions." >> /tmp/azure-costs.md
            echo "" >> /tmp/azure-costs.md
            echo "Ensure the service principal has **Cost Management Reader** role." >> /tmp/azure-costs.md
          fi
        continue-on-error: true

      # Validate Resource Tags
      - name: Validate Resource Tags
        if: steps.check_files.outputs.has_tf_files == 'true'
        id: tag_validation
        shell: bash
        run: |
          set +e  # Disable exit on error for this script
          TF_DIR="${{ inputs.terraform_directory }}"
          IFS=',' read -ra REQUIRED_TAGS <<< "${{ inputs.required_tags }}"

          trim() {
            local value="$1"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }

          extract_map_keys() {
            local start_pattern="$1"
            local file_path="$2"
            awk -v pattern="$start_pattern" '
              BEGIN { in_map = 0; depth = 0 }
              !in_map && $0 ~ pattern {
                in_map = 1
                depth = gsub(/\{/, "&") - gsub(/\}/, "&")
                next
              }
              in_map {
                open_count = gsub(/\{/, "&")
                close_count = gsub(/\}/, "&")
                if ($0 !~ /^[[:space:]]*#/ && $0 !~ /^[[:space:]]*\/\// && $0 ~ /^[[:space:]]*[A-Za-z0-9_-]+[[:space:]]*=/) {
                  key = $0
                  sub(/^[[:space:]]*/, "", key)
                  sub(/[[:space:]]*=.*/, "", key)
                  print key
                }
                depth += open_count - close_count
                if (depth <= 0) {
                  exit
                }
              }
            ' "$file_path" 2>/dev/null
          }

          resolve_local_tags() {
            local map_name="$1"
            local map_keys=""
            while IFS= read -r tf_file; do
              [[ -z "$tf_file" ]] && continue
              found_keys=$(extract_map_keys "^[[:space:]]*${map_name}[[:space:]]*=[[:space:]]*\\{" "$tf_file")
              if [[ -n "$found_keys" ]]; then
                map_keys+=$'\n'"$found_keys"
              fi
            done < <(find "$TF_DIR" -name "*.tf" -type f 2>/dev/null)
            printf '%s\n' "$map_keys" | sed '/^$/d' | sort -u
          }

          collect_defined_tags() {
            local block_content="$1"
            local file_path="$2"
            local tag_assign_line
            tag_assign_line=$(printf '%s\n' "$block_content" | grep -E '^[[:space:]]*tags[[:space:]]*=' | head -1)

            if [[ -z "$tag_assign_line" ]]; then
              return
            fi

            if [[ "$tag_assign_line" =~ tags[[:space:]]*=[[:space:]]*local\.([A-Za-z0-9_]+) ]]; then
              resolve_local_tags "${BASH_REMATCH[1]}"
              return
            fi

            if [[ "$tag_assign_line" =~ tags[[:space:]]*=[[:space:]]*merge\([[:space:]]*local\.([A-Za-z0-9_]+) ]]; then
              resolve_local_tags "${BASH_REMATCH[1]}"
              printf '%s\n' "$block_content" | awk '
                BEGIN { in_tags = 0; depth = 0 }
                !in_tags && $0 ~ /^[[:space:]]*tags[[:space:]]*=[[:space:]]*merge\(/ { in_tags = 1 }
                in_tags {
                  if ($0 ~ /^[[:space:]]*[A-Za-z0-9_-]+[[:space:]]*=/) {
                    key = $0
                    sub(/^[[:space:]]*/, "", key)
                    sub(/[[:space:]]*=.*/, "", key)
                    if (key != "tags") print key
                  }
                  depth += gsub(/\(/, "&") + gsub(/\{/, "&")
                  depth -= gsub(/\)/, "&") + gsub(/\}/, "&")
                  if (in_tags && depth <= 0) exit
                }
              ' | sed '/^$/d' | sort -u
              return
            fi

            if [[ "$tag_assign_line" =~ tags[[:space:]]*=[[:space:]]*\{ ]]; then
              printf '%s\n' "$block_content" | awk '
                BEGIN { in_tags = 0; depth = 0 }
                !in_tags && $0 ~ /^[[:space:]]*tags[[:space:]]*=[[:space:]]*\{/ {
                  in_tags = 1
                  depth = 1
                  next
                }
                in_tags {
                  if ($0 ~ /^[[:space:]]*[A-Za-z0-9_-]+[[:space:]]*=/) {
                    key = $0
                    sub(/^[[:space:]]*/, "", key)
                    sub(/[[:space:]]*=.*/, "", key)
                    print key
                  }
                  depth += gsub(/\{/, "&")
                  depth -= gsub(/\}/, "&")
                  if (depth <= 0) exit
                }
              ' | sed '/^$/d' | sort -u
            fi
          }
          
          echo "## Tag Validation Report" > /tmp/tag-validation.md
          echo "" >> /tmp/tag-validation.md
          echo "**Required Tags:** ${REQUIRED_TAGS[*]}" >> /tmp/tag-validation.md
          echo "" >> /tmp/tag-validation.md
          : > /tmp/tag-missing-pairs.txt
          
          MISSING_TAGS=0
          RESOURCES_CHECKED=0
          
          for file in $(find "$TF_DIR" -name "*.tf" -type f 2>/dev/null); do
            while IFS= read -r line; do
              if [[ -z "$line" ]]; then continue; fi
              
              resource_type=$(echo "$line" | sed -n 's/.*resource "\([^"]*\)".*/\1/p')
              resource_name=$(echo "$line" | sed -n 's/.*resource "[^"]*" "\([^"]*\)".*/\1/p')
              
              if [[ -n "$resource_type" && -n "$resource_name" && "$resource_type" == azurerm_* ]]; then
                RESOURCES_CHECKED=$((RESOURCES_CHECKED + 1))
                line_num=$(echo "$line" | cut -d: -f1)
                block_content=$(sed -n "${line_num},$((line_num + 100))p" "$file" 2>/dev/null || true)
                
                if ! echo "$block_content" | grep -q "tags\s*="; then
                  echo "### ❌ \`$resource_type.$resource_name\`" >> /tmp/tag-validation.md
                  echo "**File:** \`$file\` | **Issue:** No tags block" >> /tmp/tag-validation.md
                  echo "" >> /tmp/tag-validation.md
                  MISSING_TAGS=$((MISSING_TAGS + ${#REQUIRED_TAGS[@]}))
                  for required_tag in "${REQUIRED_TAGS[@]}"; do
                    required_tag=$(trim "$required_tag")
                    [[ -z "$required_tag" ]] && continue
                    echo "${required_tag}|${resource_type}.${resource_name}" >> /tmp/tag-missing-pairs.txt
                  done
                else
                  defined_tags=$(collect_defined_tags "$block_content" "$file")
                  missing_for_resource=()

                  for required_tag in "${REQUIRED_TAGS[@]}"; do
                    required_tag=$(trim "$required_tag")
                    [[ -z "$required_tag" ]] && continue
                    if ! printf '%s\n' "$defined_tags" | grep -Fxq "$required_tag"; then
                      missing_for_resource+=("$required_tag")
                    fi
                  done

                  if [[ ${#missing_for_resource[@]} -gt 0 ]]; then
                    echo "### ❌ \`$resource_type.$resource_name\`" >> /tmp/tag-validation.md
                    echo "**File:** \`$file\` | **Missing Tags:** ${missing_for_resource[*]}" >> /tmp/tag-validation.md
                    echo "" >> /tmp/tag-validation.md
                    MISSING_TAGS=$((MISSING_TAGS + ${#missing_for_resource[@]}))
                    for missing_tag in "${missing_for_resource[@]}"; do
                      echo "${missing_tag}|${resource_type}.${resource_name}" >> /tmp/tag-missing-pairs.txt
                    done
                  fi
                fi
              fi
            done <<< "$(grep -n "^resource \"azurerm_" "$file" 2>/dev/null || true)"
          done

          RESOURCES_MISSING_TAGS=0
          COMMON_MISSING_TAGS=""
          if [[ -s /tmp/tag-missing-pairs.txt ]]; then
            RESOURCES_MISSING_TAGS=$(awk -F'|' '{print $2}' /tmp/tag-missing-pairs.txt | sort -u | sed '/^$/d' | wc -l | tr -d ' ')
            COMMON_MISSING_TAGS=$(awk -F'|' '{print $1}' /tmp/tag-missing-pairs.txt | sort -u | paste -sd ',' - | sed 's/,/, /g')
          fi

          echo "### Summary" >> /tmp/tag-validation.md
          echo "" >> /tmp/tag-validation.md
          echo "Resources Missing Tags: $RESOURCES_MISSING_TAGS" >> /tmp/tag-validation.md
          echo "Total Missing Tags: $MISSING_TAGS" >> /tmp/tag-validation.md
          if [[ -n "$COMMON_MISSING_TAGS" ]]; then
            echo "Common Missing Tags: $COMMON_MISSING_TAGS" >> /tmp/tag-validation.md
          else
            echo "Common Missing Tags: None" >> /tmp/tag-validation.md
          fi
          echo "" >> /tmp/tag-validation.md

          echo "### Missing tags" >> /tmp/tag-validation.md
          if [[ -s /tmp/tag-missing-pairs.txt ]]; then
            for required_tag in "${REQUIRED_TAGS[@]}"; do
              required_tag=$(trim "$required_tag")
              [[ -z "$required_tag" ]] && continue
              resources_for_tag=$(awk -F'|' -v tag="$required_tag" '$1 == tag {print $2}' /tmp/tag-missing-pairs.txt | sort -u)
              if [[ -n "$resources_for_tag" ]]; then
                echo "- **${required_tag}:**" >> /tmp/tag-validation.md
                while IFS= read -r resource_entry; do
                  [[ -z "$resource_entry" ]] && continue
                  echo "  - \`${resource_entry}\`" >> /tmp/tag-validation.md
                done <<< "$resources_for_tag"
              fi
            done
          else
            echo "- None" >> /tmp/tag-validation.md
          fi
          echo "" >> /tmp/tag-validation.md
          
          echo "---" >> /tmp/tag-validation.md
          echo "| Resources Checked | $RESOURCES_CHECKED | Missing Tags | $MISSING_TAGS |" >> /tmp/tag-validation.md
          
          if [[ $MISSING_TAGS -eq 0 ]]; then
            echo "" >> /tmp/tag-validation.md
            echo "✅ **All resources contain the required tag keys.**" >> /tmp/tag-validation.md
          fi
          
          echo "missing_tags=$MISSING_TAGS" >> $GITHUB_OUTPUT
          
          if [[ "${{ inputs.fail_on_missing_tags }}" == "true" && $MISSING_TAGS -gt 0 ]]; then
            echo "::error::Missing required tags on $MISSING_TAGS resources"
            exit 1
          fi
          exit 0

      # Analyze with GitHub Copilot (using Azure data)
      - name: Analyze with GitHub Copilot
        if: steps.check_files.outputs.has_tf_files == 'true'
        id: copilot_analysis
        uses: actions/github-script@v7
        env:
          MODELS_TOKEN: ${{ secrets.MODEL_ACCES || github.token }}
          AI_MODEL: ${{ inputs.ai_model }}
          AZURE_REGION: ${{ inputs.azure_region }}
          COST_THRESHOLD: ${{ inputs.cost_threshold }}
          CURRENT_DATE: ${{ github.event.pull_request.updated_at || github.run_id }}
        with:
          script: |
            const fs = require('fs');
            
            // Read all collected data
            const prTerraform = fs.readFileSync('/tmp/pr-terraform.txt', 'utf8');
            const baseTerraform = fs.readFileSync('/tmp/base-terraform.txt', 'utf8');
            const diffContent = fs.readFileSync('/tmp/terraform-diff.txt', 'utf8');
            const tfPlan = fs.existsSync('/tmp/terraform-plan.txt') ? fs.readFileSync('/tmp/terraform-plan.txt', 'utf8') : 'Plan not available';
            const tagValidation = fs.readFileSync('/tmp/tag-validation.md', 'utf8');
            const azurePricing = fs.existsSync('/tmp/azure-pricing.md') ? fs.readFileSync('/tmp/azure-pricing.md', 'utf8') : '';
            const costImpact = fs.existsSync('/tmp/cost-impact.md') ? fs.readFileSync('/tmp/cost-impact.md', 'utf8') : '';
            const azureAdvisor = fs.existsSync('/tmp/azure-advisor.md') ? fs.readFileSync('/tmp/azure-advisor.md', 'utf8') : '';
            const orphanedResources = fs.existsSync('/tmp/orphaned-resources.md') ? fs.readFileSync('/tmp/orphaned-resources.md', 'utf8') : '';
            const azureCosts = fs.existsSync('/tmp/azure-costs.md') ? fs.readFileSync('/tmp/azure-costs.md', 'utf8') : '';
            
            const maxLen = 10000;
            const truncate = (str) => str.length > maxLen ? str.substring(0, maxLen) + '\n... (truncated)' : str;
            const workflowDate = new Date().toISOString().slice(0, 10);
            const extractPricingRows = (markdown) => markdown
              .split('\n')
              .filter(line => line.startsWith('| azurerm_'))
              .map(line => line.split('|').slice(1, -1).map(part => part.trim()))
              .filter(parts => parts.length >= 6)
              .map(([resourceType, meterName, unitPrice, unit, monthlyEstimate, notes]) => ({
                resourceType,
                meterName,
                unitPrice,
                unit,
                monthlyEstimate,
                notes,
              }));

            const typeToAddress = Object.fromEntries(
              [...prTerraform.matchAll(/resource\s+"([^"]+)"\s+"([^"]+)"/g)].map(([, type, name]) => [type, `${type}.${name}`])
            );

            const planActions = Object.fromEntries(
              [...tfPlan.matchAll(/^#\s+(\S+)\s+will be\s+(.+)$/gm)].map(([, address, actionText]) => {
                let action = 'Modified';
                if (actionText.includes('created')) action = 'Added';
                else if (actionText.includes('destroyed')) action = 'Removed';
                else if (actionText.includes('read during apply')) action = 'Read';
                return [address, action];
              })
            );

            const buildDeterministicCostSection = (pricingRows) => {
              if (!pricingRows.length) return '';

              let totalFixed = 0;
              let hasVariable = false;

              const tableRows = pricingRows.map((row) => {
                const resourceAddress = typeToAddress[row.resourceType] || row.resourceType;
                const action = planActions[resourceAddress] || (row.resourceType === 'azurerm_storage_account' ? 'Modified' : 'Added');
                const numericMonthly = row.monthlyEstimate.match(/^£([\d,.]+)$/);
                if (numericMonthly) {
                  totalFixed += parseFloat(numericMonthly[1].replace(/,/g, ''));
                } else {
                  hasVariable = true;
                }

                const notes = row.notes.replace(/\|/g, '/');
                return `| **${action}** | \`${resourceAddress}\` | ${row.monthlyEstimate} | ${row.meterName} | ${notes} |`;
              }).join('\n');

              const totalLabel = hasVariable
                ? `£${totalFixed.toFixed(2)} + variable usage-based charges`
                : `£${totalFixed.toFixed(2)} (increase)`;
              const confidence = hasVariable
                ? 'High (based on live Azure retail pricing, with variable usage-based components called out explicitly)'
                : 'High (based on live Azure retail pricing rows for the configured region)';

              return [
                '### 💰 Cost Impact Analysis',
                '| Change | Resource | Est. Monthly Cost | Azure SKU/Tier | Notes |',
                '|--------|----------|-------------------|----------------|-------|',
                tableRows,
                '',
                `**Total Estimated Monthly Impact:** ${totalLabel}`,
                `**Confidence Level:** ${confidence}`,
              ].join('\n');
            };
            
            const prompt = `You are an Azure Cost Optimization expert (similar to Azure's AzureCostOptimizeAgent). 
            Analyze the following Terraform changes and Azure data to provide comprehensive cost analysis.

            Today's date is ${workflowDate}. Treat this as the pricing reference date for your narrative.

            ## YOUR MISSION
            1. **Estimate Cost Impact**: Calculate monthly cost changes based on Azure pricing for ${process.env.AZURE_REGION} region
            2. **Identify Savings Opportunities**: Using Azure Advisor data and orphaned resources
            3. **Tag Compliance**: Review tag validation
            4. **Security & Best Practices**: Identify issues
            5. **Actionable Recommendations**: Provide specific commands or changes

            ## FRESHNESS RULES
            - Use current-date language anchored to ${workflowDate}.
            - Do not mention training cutoffs, knowledge cutoffs, or stale dates such as 2023.
            - Do not say "as of 2023" or similar anywhere in the response.
            - Prefer the LIVE AZURE RETAIL PRICING section over model priors whenever it contains a matching price row.
            - If exact live retail pricing cannot be proven from the supplied Azure data, say the estimate is based on current workflow data and set confidence to Medium instead of citing an old year.
            - For usage-based resources such as storage accounts or Application Insights, do not invent a fixed monthly cost unless the Terraform clearly specifies billable quantity. Use unit pricing and call out the assumption if you provide an example monthly figure.
            - For hourly or daily SKUs with a live retail row, derive the monthly estimate from that live retail row.
            - If LIVE AZURE RETAIL PRICING contains a row for a resource, you MUST use that row's unit price and monthly estimate verbatim in the cost table instead of inventing a different number.
            - If a LIVE AZURE RETAIL PRICING row shows Variable for monthly estimate, keep the table entry as Variable and explain the assumption in Notes.

            ## TERRAFORM PLAN OUTPUT
            ${truncate(tfPlan)}

            ## TERRAFORM DIFF
            ${truncate(diffContent)}

            ## LIVE AZURE RETAIL PRICING
            ${truncate(azurePricing)}

            ## BASE TERRAFORM (Before)
            ${truncate(baseTerraform)}

            ## PR TERRAFORM (After)
            ${truncate(prTerraform)}

            ## AZURE ADVISOR RECOMMENDATIONS
            ${truncate(azureAdvisor)}

            ## ORPHANED RESOURCES
            ${truncate(orphanedResources)}

            ## CURRENT AZURE COSTS
            ${truncate(azureCosts)}

            ## TAG VALIDATION
            ${truncate(tagValidation)}

            ## OUTPUT FORMAT (use exactly this markdown structure)

            ### 💰 Cost Impact Analysis
            | Change | Resource | Est. Monthly Cost | Azure SKU/Tier | Notes |
            |--------|----------|-------------------|----------------|-------|
            | Added/Modified/Removed | resource_name | £X.XX | SKU details | explanation |

            **Total Estimated Monthly Impact:** £X.XX (increase/decrease)
            **Confidence Level:** High/Medium/Low (based on available data)

            ### 📦 Resource Changes Summary
            - **Added:** resources with SKU details
            - **Modified:** resources and what changed
            - **Removed:** resources

            ### 💡 Cost Optimization Recommendations
            Based on Azure best practices and the analysis:
            1. [Specific recommendation with savings estimate in GBP and Azure CLI command if applicable]
            2. [Reserved Instance recommendations if applicable]
            3. [Right-sizing recommendations]
            4. [Orphaned resource cleanup]

            ### 🏷️ Tag Compliance
            [Summary with specific missing tags]

            ### 🔐 Security & Best Practices
            [Azure Well-Architected Framework alignment]

            ### ⚡ Quick Wins
            [Immediate actions that can save money with minimal risk]

            Use accurate Azure pricing for ${process.env.AZURE_REGION} region. Report all monetary values in GBP (£). Reference specific Azure SKUs and tiers. If a resource has only unit pricing, say so explicitly instead of presenting a false fixed monthly total.`;

            try {
              const response = await fetch('https://models.inference.ai.azure.com/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.MODELS_TOKEN}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model: process.env.AI_MODEL,
                  messages: [
                    { 
                      role: 'system', 
                      content: 'You are an Azure Cost Optimization Agent with deep expertise in Azure pricing, SKUs, Reserved Instances, and the Azure Well-Architected Framework. You provide accurate cost estimates based on current Azure pricing and actionable recommendations.' 
                    },
                    { role: 'user', content: prompt }
                  ],
                  max_tokens: 4000,
                  temperature: 0.2
                })
              });
              
              if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`GitHub Models API: ${response.status} - ${errorText}`);
              }
              
              const data = await response.json();
              let analysis = data.choices[0].message.content;

              analysis = analysis
                .replace(/as of\s+[A-Za-z]+\s+20\d{2}/gi, `as of ${workflowDate}`)
                .replace(/as of\s+20\d{2}/gi, `as of ${workflowDate}`)
                .replace(/\*\*Confidence Level:\*\*\s*([^\n]*?)\s*\(based on[^\n)]*20\d{2}[^\n)]*\)/gi, '**Confidence Level:** $1 (based on current workflow data and Azure references)')
                .replace(/based on Azure pricing for [^\n]*20\d{2}/gi, 'based on current workflow data and Azure references');

              const deterministicCostSection = costImpact.trim() || buildDeterministicCostSection(extractPricingRows(azurePricing));
              if (deterministicCostSection) {
                analysis = analysis.replace(/### 💰 Cost Impact Analysis[\s\S]*?(?=\n### )/, `${deterministicCostSection}\n\n`);
              }

              fs.writeFileSync('/tmp/copilot-analysis.md', analysis);
              
              // Check cost threshold
              const threshold = parseFloat(process.env.COST_THRESHOLD);
              if (threshold > 0) {
                const costMatch = analysis.match(/Total Estimated Monthly Impact:\s*[+\-]?\s*(?:£|GBP)?\s*([\d,]+\.?\d*)/i);
                if (costMatch) {
                  const estimatedCost = parseFloat(costMatch[1].replace(',', ''));
                  if (estimatedCost > threshold) {
                    core.warning(`Estimated monthly cost increase (£${estimatedCost}) exceeds threshold (£${threshold})`);
                  }
                }
              }
              
            } catch (error) {
              console.error('Error:', error);
              const fallback = `### ⚠️ AI Analysis Unavailable\n\n${error.message}\n\n${tagValidation}\n\n${azureAdvisor}\n\n${orphanedResources}`;
              fs.writeFileSync('/tmp/copilot-analysis.md', fallback);
            }

      # Post PR Comment
      - name: Post Analysis Comment
        if: steps.check_files.outputs.has_tf_files == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentMarker = '<!-- azure-cost-analysis-comment -->';
            const analysis = fs.readFileSync('/tmp/copilot-analysis.md', 'utf8');
            const costImpact = fs.existsSync('/tmp/cost-impact.md') ? fs.readFileSync('/tmp/cost-impact.md', 'utf8') : '';
            const tagValidation = fs.existsSync('/tmp/tag-validation.md') ? fs.readFileSync('/tmp/tag-validation.md', 'utf8') : '';

            const parseCostRows = (markdown) => markdown
              .split('\n')
              .filter(line => /^\| \*\*(Added|Modified|Removed)\*\* \|/.test(line))
              .map(line => {
                const cells = line.split('|').slice(1, -1).map(cell => cell.trim());
                return {
                  action: (cells[0] || '').replace(/\*\*/g, ''),
                  resource: (cells[1] || '').replace(/`/g, ''),
                  estimate: cells[2] || '',
                  sku: cells[3] || '',
                  notes: cells[4] || ''
                };
              });

            const buildDeterministicResourceSummary = (rows) => {
              const byAction = { Added: [], Modified: [], Removed: [] };
              for (const row of rows) {
                if (!byAction[row.action]) continue;
                const line = `  - \`${row.resource}\`: ${row.sku || 'N/A'}${row.estimate ? ` (${row.estimate})` : ''}.`;
                byAction[row.action].push(line);
              }

              const section = [
                '### 📦 Resource Changes Summary',
                '- **Added:**',
                ...(byAction.Added.length ? byAction.Added : ['  - None.']),
                '- **Modified:**',
                ...(byAction.Modified.length ? byAction.Modified : ['  - None.']),
                '- **Removed:**',
                ...(byAction.Removed.length ? byAction.Removed : ['  - None.'])
              ];

              return section.join('\n');
            };

            const deterministicResourceSummary = buildDeterministicResourceSummary(parseCostRows(costImpact));
            const tagSummaryMatch = tagValidation.match(/### Summary[\s\S]*?(?=\n### Missing tags|\n---|$)/);
            const tagSummarySection = tagSummaryMatch ? tagSummaryMatch[0].trim() : '';
            const groupedTagSectionMatch = tagValidation.match(/### Missing tags[\s\S]*?(?=\n---|$)/);
            const groupedTagSection = groupedTagSectionMatch ? groupedTagSectionMatch[0].trim() : '';
            let analysisWithoutCostSection = analysis.replace(/### 💰 Cost Impact Analysis[\s\S]*?(?=\n### |$)/, '').trim();

            if (deterministicResourceSummary) {
              if (/### 📦 Resource Changes Summary/.test(analysisWithoutCostSection)) {
                analysisWithoutCostSection = analysisWithoutCostSection.replace(/### 📦 Resource Changes Summary[\s\S]*?(?=\n### |$)/, `${deterministicResourceSummary}\n\n`);
              } else {
                analysisWithoutCostSection = `${deterministicResourceSummary}\n\n${analysisWithoutCostSection}`.trim();
              }
            }

            if (tagSummarySection || groupedTagSection) {
              const deterministicTagCompliance = [
                '### 🏷️ Tag Compliance',
                tagSummarySection,
                groupedTagSection,
              ].filter(Boolean).join('\n\n');

              if (/### 🏷️ Tag Compliance/.test(analysisWithoutCostSection)) {
                analysisWithoutCostSection = analysisWithoutCostSection.replace(/### 🏷️ Tag Compliance[\s\S]*?(?=\n### |$)/, `${deterministicTagCompliance}\n\n`);
              } else {
                analysisWithoutCostSection = `${analysisWithoutCostSection}\n\n${deterministicTagCompliance}`.trim();
              }
            }
            const body = `${commentMarker}
            ## 🤖 Azure Cost Analysis by GitHub Copilot

            ${costImpact ? `${costImpact}

            ` : ''}${analysisWithoutCostSection}

            ---
            <sub>📊 **Analysis Details:** TF Directory: \`${{ inputs.terraform_directory }}\` | Region: \`${{ inputs.azure_region }}\` | Model: \`${{ inputs.ai_model }}\`</sub>
            <sub>🔧 **Data Sources:** Azure Resource Graph, Azure Advisor, Azure Cost Management, Terraform Plan</sub>`;
            
            const prNumber = context.issue.number || context.payload.pull_request?.number;
            
            if (prNumber) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });
              
              const botComment = comments.find(c => 
                c.user.type === 'Bot' && (
                  c.body.includes(commentMarker) ||
                  c.body.includes('Azure Cost Analysis by GitHub Copilot')
                )
              );
              
              const commentParams = {
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              };
              
              if (botComment) {
                await github.rest.issues.updateComment({ ...commentParams, comment_id: botComment.id });
              } else {
                await github.rest.issues.createComment({ ...commentParams, issue_number: prNumber });
              }
            } else {
              // No PR context (e.g. workflow_dispatch) — write to job summary instead
              await core.summary.addRaw(body).write();
              console.log('No PR found — analysis written to job summary.');
            }

      - name: Azure Logout
        if: always()
        run: az logout || true
        continue-on-error: true

      - name: Skip - No Terraform Files
        if: steps.check_files.outputs.has_tf_files == 'false'
        run: echo "No Terraform files found in ${{ inputs.terraform_directory }}. Skipping analysis."
