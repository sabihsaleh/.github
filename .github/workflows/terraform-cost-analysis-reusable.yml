          record_cosmos_throughput_resource() {
            local resource_type="$1"
            local resource_name="$2"
            local action="$3"
            local address="$resource_type.$resource_name"
            local throughput autoscale_throughput ru_units cosmos_json cosmos_price cosmos_meter cosmos_unit cosmos_monthly old_throughput old_autoscale_throughput old_ru_units old_cosmos_monthly assumption_note

            throughput=$(tf_attr_for_address "$resource_type" "$resource_name" "throughput")
            autoscale_throughput=$(tf_attr_for_address "$resource_type" "$resource_name" "max_throughput")

            if [[ -n "$autoscale_throughput" ]]; then
              ru_units=$(awk -v t="$autoscale_throughput" 'BEGIN { printf "%.2f", t / 100 }')
              assumption_note="Uses autoscale max throughput of ${autoscale_throughput} RU/s."
            elif [[ -n "$throughput" ]]; then
              ru_units=$(awk -v t="$throughput" 'BEGIN { printf "%.2f", t / 100 }')
              assumption_note="Uses provisioned throughput of ${throughput} RU/s."
            else
              ru_units=$(awk -v t="$COSMOS_ASSUMED_RU_PER_SEC" 'BEGIN { printf "%.2f", t / 100 }')
              assumption_note="No throughput was declared, so the estimate assumes ${COSMOS_ASSUMED_RU_PER_SEC} RU/s."
            fi

            cosmos_json=$(retail_query "serviceName%20eq%20'Azure%20Cosmos%20DB%20RUs'%20and%20armRegionName%20eq%20'${ANALYSIS_AZURE_REGION}'%20and%20contains(meterName,'100%20RU%2Fs')")
            cosmos_price=$(first_matching_field "$cosmos_json" '.Items[] | select(.type == "Consumption") | .unitPrice')
            cosmos_meter=$(first_matching_field "$cosmos_json" '.Items[] | select(.type == "Consumption") | .meterName')
            cosmos_unit=$(first_matching_field "$cosmos_json" '.Items[] | select(.type == "Consumption") | .unitOfMeasure')

            if [[ -n "$cosmos_price" && "$cosmos_price" != "null" ]]; then
              cosmos_monthly=$(awk -v p="$cosmos_price" -v h="$HOURS_PER_MONTH" -v ru="$ru_units" 'BEGIN { printf "£%.2f", p * h * ru }')
              append_price_row "$resource_type" "$cosmos_meter" "£$cosmos_price" "$cosmos_unit" "$cosmos_monthly" "${assumption_note} Monthly estimate is calculated as £$cosmos_price x ${HOURS_PER_MONTH} hours x ${ru_units} units of 100 RU/s."

              if [[ "$action" == "Modified" ]]; then
                old_throughput=$(tf_attr_in_dir "$BASE_TF_DIR" "$resource_type" "$resource_name" "throughput")
                old_autoscale_throughput=$(tf_attr_in_dir "$BASE_TF_DIR" "$resource_type" "$resource_name" "max_throughput")
                if [[ -n "$old_autoscale_throughput" ]]; then
                  old_ru_units=$(awk -v t="$old_autoscale_throughput" 'BEGIN { printf "%.2f", t / 100 }')
                elif [[ -n "$old_throughput" ]]; then
                  old_ru_units=$(awk -v t="$old_throughput" 'BEGIN { printf "%.2f", t / 100 }')
                else
                  old_ru_units=$(awk -v t="$COSMOS_ASSUMED_RU_PER_SEC" 'BEGIN { printf "%.2f", t / 100 }')
                fi
                old_cosmos_monthly=$(awk -v p="$cosmos_price" -v h="$HOURS_PER_MONTH" -v ru="$old_ru_units" 'BEGIN { printf "%.2f", p * h * ru }')
              fi

              add_estimate_with_optional_delta "$action" "$address" "${cosmos_monthly#£}" "$old_cosmos_monthly" "Cosmos DB Throughput" "$assumption_note Live Azure retail price from meter $cosmos_meter at £$cosmos_price per hour for each 100 RU/s."
            else
              record_unestimated_resource "$action" "$address" "Cosmos DB Throughput" "Retail pricing query did not return a usable Cosmos DB RU price row."
            fi
          }

